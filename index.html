        const AdminPlanTab = () => {
            const { bookings, holidays, users, toggleBooking, showModal, adminForceCancel } = useContext(AppContext);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            
            // Modal States
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedDateKey, setSelectedDateKey] = useState('');
            const [selectedDateObj, setSelectedDateObj] = useState(null);
            
            const [viewMode, setViewMode] = useState('main'); 
            const [selectedUserId, setSelectedUserId] = useState('');
            const [leaveType, setLeaveType] = useState('vacation');
            const [leaveAmount, setLeaveAmount] = useState("1");

            const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            // เพิ่มฟังก์ชันคำนวณกะ A / กะ B สำหรับแอดมิน
            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 
                if (dayOfWeek === 0 || dayOfWeek === 6) return 'holiday_reg';
                
                const dateJan1 = new Date(year, 0, 1);
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) return 'work_B'; 
                else return 'work_A'; 
            };

            const getDayStatus = (day) => {
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                // ดึงประเภทของวันมาใช้
                const dayType = holidays[dateKey] || getDefaultStatus(currentMonth.getFullYear(), currentMonth.getMonth() + 1, day);
                const isHoliday = (dayType === 'holiday_reg' || dayType === 'holiday_co'|| dayType === 'holiday_nonpro');
                const bookingsOnDate = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
                return { isHoliday, dayType, bookingsOnDate };
            };

            const handleDayClick = (day) => {
                const dateObj = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                const dateKey = `${dateObj.getFullYear()}-${dateObj.getMonth() + 1}-${dateObj.getDate()}`;
                setSelectedDateObj(dateObj);
                setSelectedDateKey(dateKey);
                setViewMode('main');
                setIsModalOpen(true);
            };

            const handleSaveLeave = async () => {
                const targetUser = users.find(u => u.id === selectedUserId);
                if (!targetUser) return showModal("ผิดพลาด", "ไม่พบข้อมูลสมาชิก", "alert");
                
                const result = await toggleBooking(selectedDateKey, targetUser, leaveType, true, parseFloat(leaveAmount));
                if (result.success) {
                    setViewMode('main'); 
                    showModal("สำเร็จ", "จองวันลาให้สมาชิกเรียบร้อยแล้ว", "alert"); 
                } else {
                    showModal("ผิดพลาด", result.message, "alert");
                }
            };

            const renderCalendar = () => {
                const days = [];
                const totalDays = daysInMonth(currentMonth);
                const startDay = firstDayOfMonth(currentMonth);

                for (let i = 0; i < startDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-14"></div>);
                }

                for (let i = 1; i <= totalDays; i++) {
                    const { isHoliday, dayType, bookingsOnDate } = getDayStatus(i);
                    
                    // กำหนดสีตามประเภทของวัน
                    let bgClass = "bg-white border-slate-100 text-slate-700 hover:bg-slate-50";
                    if (dayType === 'work_A') bgClass = "bg-yellow-200 border-yellow-400 text-yellow-800 hover:bg-yellow-300";
                    else if (dayType === 'work_B') bgClass = "bg-emerald-300 border-emerald-600 text-emerald-900 hover:bg-emerald-400";
                    else if (dayType === 'holiday_reg') bgClass = "bg-slate-200 border-slate-300 text-slate-500 opacity-90";
                    else if (dayType === 'holiday_co') bgClass = "bg-pink-200 border-pink-300 text-pink-700 hover:bg-pink-300 opacity-95";
                    else if (dayType === 'holiday_nonpro') bgClass = "bg-gradient-to-br from-rose-200 via-fuchsia-200 to-indigo-200 border-purple-300 text-purple-800 hover:opacity-80 opacity-95";
                    
                    const today = new Date();
                    const isToday = today.getDate() === i && today.getMonth() === currentMonth.getMonth() && today.getFullYear() === currentMonth.getFullYear();

                    days.push(
                        <div key={i} onClick={() => handleDayClick(i)} className={`h-14 rounded-xl border flex flex-col items-center justify-start pt-1 relative cursor-pointer transition-all active:scale-95 ${bgClass} ${isToday ? 'ring-2 ring-blue-500 ring-offset-2 z-10' : ''}`}>
                            <span className="text-sm font-bold leading-none">{i}</span>
                            
                            <div className="mt-0.5 flex flex-col items-center w-full px-0.5 space-y-0.5">
                                {isHoliday && <span className="text-[8px] font-bold mt-1 text-center truncate w-full">
                                    {dayType === 'holiday_co' ? 'บ.หยุด' : (dayType === 'holiday_nonpro' ? 'Non Pro.' : 'หยุด')}
                                </span>}
                                {!isHoliday && bookingsOnDate && bookingsOnDate.length > 0 && (
                                    bookingsOnDate.slice(0, 3).map((b, idx) => {
                                        const bookerUser = users.find(u => u.id === b.userId);
                                        const displayFirstName = bookerUser ? bookerUser.firstName.split(' ')[0] : b.userName.split(' ')[0];
                                        const photoUrl = bookerUser ? getDriveImgUrl(bookerUser.photo) : null;
                                        return (
                                            <div key={idx} className="relative w-full h-[18px] flex items-center justify-center overflow-hidden rounded-sm">
                                                <div className="absolute inset-0 flex items-center justify-center animate-cf-name">
                                                    <span className="text-[8px] font-bold truncate px-1 py-0.5 w-full text-center bg-blue-50 text-blue-600 border border-blue-100 rounded-sm leading-tight shadow-sm">
                                                        {displayFirstName}
                                                    </span>
                                                </div>
                                                <div className="absolute inset-0 flex items-center justify-center animate-cf-image">
                                                    {photoUrl ? (
                                                        <img src={photoUrl} className="w-[16px] h-[16px] rounded-full object-cover shadow-sm" />
                                                    ) : (
                                                        <div className="w-[16px] h-[16px] rounded-full flex items-center justify-center bg-blue-100 text-blue-500">
                                                            <Icons.User size={10} />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                {!isHoliday && bookingsOnDate && bookingsOnDate.length > 3 && (
                                    <span className="text-[7px] font-bold text-slate-500 bg-white/50 px-1 rounded">+{bookingsOnDate.length - 3}</span>
                                )}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            const currentBookings = Object.values(bookings).filter(b => b.date === selectedDateKey && b.status === 'active');

            return (
                <div className="animate-in slide-up">
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 slide-up shadow-2xl overflow-hidden">
                                
                                {viewMode === 'main' && (
                                    <div className="animate-in">
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">จัดการวันลาของสมาชิก</h3>
                                                <p className="text-xs text-slate-500">{selectedDateObj?.toLocaleDateString('th-TH', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                                            </div>
                                            <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.Check size={20}/></button>
                                        </div>

                                        <div className="space-y-3 max-h-[40vh] overflow-y-auto custom-scrollbar pr-2 mb-4">
                                            {currentBookings.length === 0 ? (
                                                <div className="text-center py-6 text-slate-400 text-sm bg-slate-50 rounded-xl border border-slate-100">ไม่มีสมาชิกจองวันลาในวันนี้</div>
                                            ) : (
                                                currentBookings.map((b, i) => {
                                                    const u = users.find(user => user.id === b.userId);
                                                    return (
                                                        <div key={i} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                            <div className="flex items-center gap-2 overflow-hidden">
                                                                <div className="w-8 h-8 rounded-full bg-slate-200 shrink-0 overflow-hidden">
                                                                    {u?.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="p-1 w-full h-full text-slate-400"/>}
                                                                </div>
                                                                <div className="min-w-0">
                                                                    <div className="font-bold text-sm text-slate-700 truncate">{b.userName}</div>
                                                                    <div className="text-[10px] text-slate-500">{b.type} {b.amount && b.amount != 1 ? `(${b.amount})` : ''}</div>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => adminForceCancel(b.date, b.userId)} className="shrink-0 px-3 py-1.5 bg-rose-50 text-rose-600 text-xs font-bold rounded-lg border border-rose-100 hover:bg-rose-100">ยกเลิก</button>
                                                        </div>
                                                    )
                                                })
                                            )}
                                        </div>
                                        
                                        <button onClick={() => setViewMode('select_user')} className="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold border border-blue-200 hover:bg-blue-100 flex items-center justify-center gap-2 transition-all active:scale-95">
                                            <Icons.Plus size={18}/> จองวันลาให้สมาชิก
                                        </button>
                                    </div>
                                )}

                                {viewMode === 'select_user' && (
                                    <div className="animate-in slide-in-from-right">
                                        <div className="flex items-center gap-3 mb-6">
                                            <button onClick={() => setViewMode('main')} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.ChevronLeft size={20}/></button>
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">เลือกสมาชิก</h3>
                                                <p className="text-xs text-slate-500">{selectedDateObj?.toLocaleDateString('th-TH', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-2 max-h-[50vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                                            {users.length === 0 ? (
                                                <div className="text-center py-6 text-slate-400 text-sm">ไม่พบข้อมูลสมาชิก</div>
                                            ) : (
                                                users.map(u => (
                                                    <button
                                                        key={u.id}
                                                        onClick={() => { setSelectedUserId(u.id); setViewMode('select_leave'); }}
                                                        className="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 bg-slate-50 hover:bg-blue-50 hover:border-blue-200 transition-all text-left"
                                                    >
                                                        <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0">
                                                            {u.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="w-full h-full p-2 text-slate-400"/>}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-bold text-slate-700 truncate">{u.firstName}</div>
                                                            <div className="text-xs text-slate-500 truncate">({u.nickName})</div>
                                                        </div>
                                                        <Icons.ChevronRight size={16} className="text-slate-400" />
                                                    </button>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                )}

                                {viewMode === 'select_leave' && (
                                    <div className="animate-in slide-in-from-right">
                                        <div className="flex items-center gap-3 mb-6">
                                            <button onClick={() => setViewMode('select_user')} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.ChevronLeft size={20}/></button>
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">รายละเอียดการลา</h3>
                                                <p className="text-xs text-blue-600 font-bold">พนักงาน: {users.find(u => u.id === selectedUserId)?.nickName}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 ml-1">ประเภทการลา</label>
                                                <div className="grid grid-cols-2 gap-2 mt-1">
                                                    <button onClick={()=>setLeaveType('vacation')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='vacation'?'bg-blue-500 text-white border-blue-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>พักร้อน</button>
                                                    <button onClick={()=>setLeaveType('personal')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='personal'?'bg-orange-500 text-white border-orange-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลากิจ</button>
                                                    <button onClick={()=>setLeaveType('sick')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='sick'?'bg-rose-500 text-white border-rose-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลาป่วย</button>
                                                    <button onClick={()=>setLeaveType('special')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='special'?'bg-purple-500 text-white border-purple-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลากิจพิเศษ</button>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 ml-1">ระยะเวลา</label>
                                                <select value={leaveAmount} onChange={(e)=>setLeaveAmount(e.target.value)} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                                    <option value="1">1.00 (เต็มวัน)</option>
                                                    <option value="0.47">0.47 (ครึ่งเช้า)</option>
                                                    <option value="0.53">0.53 (ครึ่งบ่าย)</option>
                                                </select>
                                            </div>

                                            <div className="flex gap-3 pt-4 border-t border-slate-100">
                                                <button onClick={() => setViewMode('main')} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
                                                <button onClick={handleSaveLeave} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">ยืนยันการจอง</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-[2rem] shadow-sm overflow-hidden border border-slate-100 p-4">
                        <div className="flex justify-between items-center mb-4 bg-slate-50 p-2 rounded-2xl">
                            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 hover:bg-slate-200 rounded-xl transition-colors"><Icons.ChevronLeft /></button>
                            <span className="font-bold text-lg text-slate-700">
                                {currentMonth.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}
                            </span>
                            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 hover:bg-slate-200 rounded-xl transition-colors"><Icons.ChevronRight /></button>
                        </div>
                        
                        {/* แถบอธิบายสีต่างๆ */}
                        <div className="flex justify-center gap-3 mb-4 text-[10px] font-bold text-slate-500 bg-white p-2 rounded-xl shadow-sm border border-slate-100 flex-wrap">
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-yellow-500"></div> กะ A</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> กะ B</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-pink-500"></div> หยุด บ.</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-slate-400"></div> หยุดปกติ</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-gradient-to-br from-rose-400 via-fuchsia-500 to-indigo-500"></div> Non Pro.</span>
                        </div>

                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            <span className="text-red-400 font-bold text-xs">อา</span><span className="text-xs font-bold text-slate-400">จ</span><span className="text-xs font-bold text-slate-400">อ</span><span className="text-xs font-bold text-slate-400">พ</span><span className="text-xs font-bold text-slate-400">พฤ</span><span className="text-xs font-bold text-slate-400">ศ</span><span className="text-blue-400 font-bold text-xs">ส</span>
                        </div>
                        <div className="grid grid-cols-7 gap-2">
                            {renderCalendar()}
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = () => {
            const { users, pendingUsers, bookings, holidays, approveUser, adminDeleteUser, settings, adminUpdateSettings, adminForceCancel, showModal, toggleBooking } = useContext(AppContext);
            const [activeTab, setActiveTab] = useState('plan');
            const [editingUser, setEditingUser] = useState(null); 
            const [isBookingModalOpen, setIsBookingModalOpen] = useState(false);
            const [adminBookingData, setAdminBookingData] = useState({ userId: '', date: '', type: 'vacation', amount: 1 });
            
            const [localSettings, setLocalSettings] = useState({ 
                max_leaves_per_day: 2,
                default_quota: 10,
                min_attendance_percent: 96,
                min_advance_days: 3,   
                max_advance_months: 3, 
                ...settings 
            });

            useEffect(() => { 
                setLocalSettings(prev => ({...prev, ...settings})); 
            }, [settings]);

            const handleSaveSettings = async () => {
                 const updates = {
                     max_leaves_per_day: parseInt(localSettings.max_leaves_per_day),
                     default_quota: parseFloat(localSettings.default_quota),
                     min_attendance_percent: parseFloat(localSettings.min_attendance_percent),
                     min_advance_days: parseInt(localSettings.min_advance_days),     
                     max_advance_months: parseInt(localSettings.max_advance_months)  
                 };
                 const ok = await adminUpdateSettings(updates);
                 showModal(
                     ok ? "สำเร็จ" : "ผิดพลาด",
                     ok ? "บันทึกการตั้งค่าเรียบร้อยแล้ว" : "บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง",
                     "alert"
                 );
            };

            const handleAdminBookingSubmit = async (e) => {
                e.preventDefault();
                if (!adminBookingData.userId || !adminBookingData.date) return showModal("ข้อมูลไม่ครบ", "กรุณากรอกข้อมูลให้ครบ", "alert");
                const targetUser = users.find(u => u.id === adminBookingData.userId);
                if (!targetUser) return showModal("ไม่พบข้อมูล", "User not found", "alert");
                const dateParts = adminBookingData.date.split('-'); 
                const dateKey = `${parseInt(dateParts[0])}-${parseInt(dateParts[1])}-${parseInt(dateParts[2])}`;
                
                const result = await toggleBooking(dateKey, targetUser, adminBookingData.type, true, parseFloat(adminBookingData.amount));
                if (result.success) {
                    showModal("สำเร็จ", "บันทึกเรียบร้อย", "alert", () => {
                        setIsBookingModalOpen(false);
                        setAdminBookingData({ userId: '', date: '', type: 'vacation', amount: 1 });
                    });
                } else {
                    showModal("ผิดพลาด", result.message, "alert");
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 p-6 pb-32 animate-in">
                    {editingUser && <EditUserModal user={editingUser} onClose={() => setEditingUser(null)} />}
                    
                    {isBookingModalOpen && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setIsBookingModalOpen(false)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 slide-up shadow-2xl">
                                <h3 className="text-xl font-bold text-slate-800 mb-4">ลงบันทึกวันลาให้พนักงาน</h3>
                                <form onSubmit={handleAdminBookingSubmit} className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400">พนักงาน</label>
                                        <select className="w-full p-3 bg-slate-50 rounded-xl border" value={adminBookingData.userId} onChange={e => setAdminBookingData({...adminBookingData, userId: e.target.value})}>
                                            <option value="">-- เลือกพนักงาน --</option>
                                            {users.map(u => <option key={u.id} value={u.id}>{u.firstName} ({u.nickName})</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-400">วันที่</label>
                                        <input type="date" className="w-full p-3 bg-slate-50 rounded-xl border" value={adminBookingData.date} onChange={e => setAdminBookingData({...adminBookingData, date: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400">ประเภท</label>
                                            <select className="w-full p-3 bg-slate-50 rounded-xl border text-sm" value={adminBookingData.type} onChange={e => setAdminBookingData({...adminBookingData, type: e.target.value})}>
                                                <option value="vacation">พักร้อน</option>
                                                <option value="personal">ลากิจ</option>
                                                <option value="sick">ลาป่วย</option>
                                                <option value="special">ลากิจพิเศษ</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400">จำนวน</label>
                                            <select className="w-full p-3 bg-slate-50 rounded-xl border text-sm" value={adminBookingData.amount} onChange={e => setAdminBookingData({...adminBookingData, amount: e.target.value})}>
                                                <option value="1">1.00 (เต็มวัน)</option>
                                                <option value="0.47">0.47 (ครึ่งเช้า)</option>
                                                <option value="0.53">0.53 (ครึ่งบ่าย)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setIsBookingModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold">ยกเลิก</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">บันทึก</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <h2 className="text-2xl font-black text-slate-800 mb-6">ผู้ดูแลระบบ</h2>
                    <AdminStats />

                    <div className="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
                        <button onClick={() => setActiveTab('plan')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${activeTab === 'plan' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200' : 'bg-white text-slate-500'}`}>วางแผนวันลา</button>
                        <button onClick={() => setActiveTab('pending')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${activeTab === 'pending' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-slate-500'}`}>คำขอใหม่ ({pendingUsers.length})</button>
                        <button onClick={() => setActiveTab('users')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${activeTab === 'users' ? 'bg-slate-800 text-white shadow-lg' : 'bg-white text-slate-500'}`}>สมาชิก ({users.length})</button>
                        <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-all ${activeTab === 'settings' ? 'bg-emerald-600 text-white shadow-lg' : 'bg-white text-slate-500'}`}>ตั้งค่า</button>
                    </div>

                    <div className="space-y-4">
                        {activeTab === 'plan' && <AdminPlanTab />}
                        {activeTab === 'pending' && (
                             pendingUsers.length === 0 ? <div className="text-center text-slate-400 py-10">ไม่มีคำขอใหม่</div> :
                            pendingUsers.map(u => (
                                <div key={u.id} className="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4">
                                     <div className="w-12 h-12 rounded-full bg-slate-100 overflow-hidden shrink-0">
                                          {u.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="p-2 w-full h-full text-slate-300"/>}
                                     </div>
                                     <div className="flex-1 min-w-0">
                                          <h4 className="font-bold text-slate-800 truncate">{u.firstName} ({u.nickName})</h4>
                                          <p className="text-xs text-slate-500">วันลา: {u.quota}</p>
                                     </div>
                                     <div className="flex gap-2">
                                          <button onClick={() => approveUser(u.id)} className="p-2 bg-emerald-100 text-emerald-600 rounded-xl hover:bg-emerald-200"><Icons.CheckCircle size={20}/></button>
                                          <button onClick={() => adminDeleteUser(u.id)} className="p-2 bg-rose-100 text-rose-600 rounded-xl hover:bg-rose-200"><Icons.Trash2 size={20}/></button>
                                     </div>
                                </div>
                            ))
                        )}
                        
                        {activeTab === 'users' && users.map(u => {
                             const userBookings = Object.values(bookings).filter(b => b.userId === u.id);
                             const used = userBookings.filter(b => b.type === 'vacation').reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);
                             const left = (parseFloat(u.quota) - used).toFixed(2);
                            return (
                                <div key={u.id} className="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-slate-100 overflow-hidden shrink-0">
                                         {u.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="p-2 w-full h-full text-slate-300"/>}
                                    </div>
                                    <div className="flex-1">
                                        <h4 className="font-bold text-slate-800">{u.firstName} ({u.nickName})</h4>
                                        <p className="text-xs text-slate-500 mt-1">
                                            โควตา: <span className="font-bold text-blue-600">{u.quota}</span> | 
                                            ใช้: <span className="font-bold text-orange-500">{used.toFixed(2)}</span> | 
                                            เหลือ: <span className="font-bold text-emerald-600">{left}</span>
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setEditingUser(u)} className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100"><Icons.Edit size={18}/></button>
                                        <button onClick={() => adminDeleteUser(u.id)} className="p-2 bg-rose-50 text-rose-400 rounded-xl hover:bg-rose-100"><Icons.Trash2 size={18}/></button>
                                    </div>
                                </div>
                            );
                        })}

                        {activeTab === 'settings' && (
                            <div className="bg-white p-6 rounded-[2rem] shadow-sm animate-in">
                                <h3 className="font-bold text-lg mb-6 text-slate-700 flex items-center gap-2"><Icons.Settings className="text-emerald-500"/> ตั้งค่าระบบ</h3>
                                
                                <div className="space-y-8">
                                    <div className="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                        <h4 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                                            <Icons.Clock size={18} className="text-blue-500"/> ระยะเวลาการจองล่วงหน้า
                                        </h4>
                                        
                                        <div className="mb-6">
                                            <div className="flex justify-between mb-2">
                                                <label className="text-xs font-bold text-slate-500">ต้องลาล่วงหน้าอย่างน้อย (Min)</label>
                                                <span className="text-sm font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">{localSettings.min_advance_days || 0} วัน</span>
                                            </div>
                                            <input 
                                                type="range" min="0" max="30" 
                                                value={localSettings.min_advance_days || 0} 
                                                onChange={e => setLocalSettings({...localSettings, min_advance_days: e.target.value})}
                                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                                <span>0 วัน (ลาทันที)</span>
                                                <span>30 วัน</span>
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <label className="text-xs font-bold text-slate-500">จองได้ไกลสุดไม่เกิน (Max)</label>
                                                <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">{localSettings.max_advance_months || 3} เดือน</span>
                                            </div>
                                            <input 
                                                type="range" min="1" max="12" 
                                                value={localSettings.max_advance_months || 3} 
                                                onChange={e => setLocalSettings({...localSettings, max_advance_months: e.target.value})}
                                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                            />
                                            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                                <span>1 เดือน</span>
                                                <span>1 ปี</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">จำนวนคนที่ลาได้สูงสุดต่อวัน</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg" value={localSettings.max_leaves_per_day || 2} onChange={e => setLocalSettings({...localSettings, max_leaves_per_day: e.target.value})} />
                                            <span className="text-slate-400 text-sm">คน/วัน</span>
                                        </div>
                                    </div>
                                    <div className="h-px bg-slate-100"></div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">เป้าหมายการมาทำงานขั้นต่ำ (%)</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg text-blue-600" value={localSettings.min_attendance_percent || 96} onChange={e => setLocalSettings({...localSettings, min_attendance_percent: e.target.value})} />
                                            <span className="text-slate-400 text-sm">% (Attendance Target)</span>
                                        </div>
                                    </div>
                                    <div className="h-px bg-slate-100"></div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">โควตาวันลาพักร้อนเริ่มต้น</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg" value={localSettings.default_quota || 10} onChange={e => setLocalSettings({...localSettings, default_quota: e.target.value})} />
                                            <span className="text-slate-400 text-sm">วัน/ปี</span>
                                        </div>
                                    </div>
                                    <button onClick={handleSaveSettings} className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2"><Icons.Save /> บันทึกการตั้งค่า</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminCalendar = () => {
            const { holidays, toggleHoliday, syncToDb } = useContext(AppContext);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [modalConfig, setModalConfig] = useState({ isOpen: false, dateKey: '', dateStr: '', currentStatus: null });

            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDay = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            
            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 

                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    return 'holiday_reg';
                }
                
                const dateJan1 = new Date(year, 0, 1);
                
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) { 
                    return 'work_B'; 
                } else {
                    return 'work_A'; 
                }
            };
            
            const handleDayClick = (day) => {
                const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                
                const status = holidays[dateKey] || getDefaultStatus(currentDate.getFullYear(), currentDate.getMonth() + 1, day);

                setModalConfig({
                    isOpen: true,
                    dateKey,
                    dateStr: dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric'}),
                    currentStatus: status
                });
            };

            const handleSaveStatus = async (dateKey, status) => {
                setModalConfig({ ...modalConfig, isOpen: false });
                
                const result = await toggleHoliday(dateKey, status); 
                if (result.status === 'success') {
                } else {
                    alert('บันทึกไม่สำเร็จ');
                }
            };
            
            const getStatusClasses = (status) => {
                if (status === 'work_B') return "bg-emerald-200 text-emerald-800 border-emerald-400 font-bold";
                if (status === 'work_A') return "bg-yellow-200 text-yellow-800 border-yellow-400 font-bold";
                if (status === 'holiday_reg') return "bg-slate-300 text-slate-700 border-slate-400";
                if (status === 'holiday_co') return "bg-pink-200 text-pink-800 border-pink-300 font-bold";
                if (status === 'holiday_nonpro') return "bg-gradient-to-br from-rose-200 via-fuchsia-200 to-indigo-200 text-purple-800 border-purple-300 font-bold";
                return "bg-white border-slate-200 text-slate-700";
            }

            const getStatusLabel = (status) => {
                if (status === 'work_B') return 'กะ B';
                if (status === 'work_A') return 'กะ A';
                if (status === 'holiday_reg') return 'หยุด';
                if (status === 'holiday_co') return 'บ.หยุด';
                if (status === 'holiday_nonpro') return 'Non Pro.';
                return '';
            }

            const renderCalendar = () => {
                const days = [];
                const totalDays = getDaysInMonth(currentDate);
                const firstDay = getFirstDay(currentDate);

                for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`}></div>);

                for (let day = 1; day <= totalDays; day++) {
                    const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                    const status = holidays[dateKey] || getDefaultStatus(currentDate.getFullYear(), currentDate.getMonth() + 1, day); 
                    const bg = getStatusClasses(status);
                    
                    days.push(
                        <div key={day} onClick={() => handleDayClick(day)} className={`aspect-square m-1 rounded-xl border flex flex-col items-center justify-center cursor-pointer transition-all active:scale-95 text-xs ${bg}`}>
                            <span className="text-xl font-bold">{day}</span>
                            <span className="text-[10px] font-bold mt-[-4px]">{getStatusLabel(status)}</span>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="min-h-screen bg-slate-100 p-6 pb-32 animate-in">
                    {modalConfig.isOpen && (
                        <ShiftSelectionModal 
                            dateStr={modalConfig.dateStr}
                            dateKey={modalConfig.dateKey}
                            currentStatus={modalConfig.currentStatus}
                            onClose={() => setModalConfig({...modalConfig, isOpen: false})}
                            onSaveStatus={handleSaveStatus}
                        />
                    )}
                    
                    <h2 className="text-2xl font-black text-slate-800 mb-6">จัดการกะ/วันหยุด</h2>
                    <div className="bg-white p-4 rounded-2xl shadow-sm mb-4 text-xs text-slate-500">
                        <span className="font-bold">วิธีใช้:</span> กดที่วันที่เพื่อกำหนดกะทำงาน (A/B) หรือวันหยุด (พนักงานจะลาในวันหยุดไม่ได้)
                    </div>
                    
                    <div className="flex gap-3 justify-center text-xs mb-4 flex-wrap">
                        <span className="flex items-center gap-1 font-bold text-emerald-700"><div className="w-3 h-3 bg-emerald-500 rounded-full"></div> กะ B</span>
                        <span className="flex items-center gap-1 font-bold text-yellow-700"><div className="w-3 h-3 bg-yellow-500 rounded-full"></div> กะ A</span>
                        <span className="flex items-center gap-1 font-bold text-slate-500"><div className="w-3 h-3 bg-slate-400 rounded-full"></div> หยุดปกติ</span>
                        <span className="flex items-center gap-1 font-bold text-pink-700"><div className="w-3 h-3 bg-pink-500 rounded-full"></div> หยุด บ.</span>
                        <span className="flex items-center gap-1 font-bold text-purple-700"><div className="w-3 h-3 bg-gradient-to-br from-rose-400 via-fuchsia-500 to-indigo-500 rounded-full"></div> Non Pro.</span>
                    </div>

                    <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden">
                        <div className="p-4 flex justify-between items-center border-b border-slate-100">
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()-1)))}><Icons.ChevronLeft className="text-slate-400 hover:text-slate-600"/></button>
                            <h2 className="font-bold text-slate-700">{currentDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}</h2>
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()+1)))}><Icons.ChevronRight className="text-slate-400 hover:text-slate-600"/></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 p-2 text-center text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">
                             <span className="text-red-300">อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span className="text-blue-300">ส</span>
                        </div>
                        <div className="grid grid-cols-7 gap-1 p-2">
                            {renderCalendar()}
                        </div>
                    </div>
                </div>
            );
        };

        const ToastHost = () => {
            const { toast } = useContext(AppContext);
            if (!toast) return null;
            const styles = {
                success: { bg: 'bg-emerald-500', icon: <Icons.CheckCircle size={20} className="text-white" /> },
                info:    { bg: 'bg-blue-500',    icon: <Icons.Info size={20} className="text-white" /> },
                error:   { bg: 'bg-rose-500',    icon: <Icons.Info size={20} className="text-white" /> },
            };
            const s = styles[toast.kind] || styles.success;
            return (
                <div className="fixed top-5 inset-x-0 z-[1000] flex justify-center px-4 pointer-events-none">
                    <div className={`animate-toast ${s.bg} text-white rounded-2xl shadow-2xl px-5 py-3 flex items-center gap-3 max-w-xs w-full`}>
                        <div className="shrink-0">{s.icon}</div>
                        <span className="font-bold text-sm leading-snug">
                            {toast.emoji ? toast.emoji + ' ' : ''}{toast.message}
                        </span>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const { currentView, isLoading } = useContext(AppContext);
            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative shadow-2xl overflow-hidden">
                    <CustomModal /> 
                    <ToastHost />

                    {isLoading && <LoadingOverlay />}
                    {currentView === 'landing' && <LandingView />}
                    {currentView === 'adminLogin' && <AdminLoginView />}
                    {currentView === 'register' && <RegisterView />}
                    
                    {currentView === 'summary' && <><SummaryView /><BottomNav /></>}
                    {currentView === 'booking' && <><BookingView /><BottomNav /></>}
                    
                    {currentView === 'adminDashboard' && <><AdminDashboard /><BottomNav /></>}
                    {currentView === 'adminCalendar' && <><AdminCalendar /><BottomNav /></>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

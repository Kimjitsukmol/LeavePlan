    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes appearDisappear {
        0% { opacity: 0; transform: translateY(5px); }
        10% { opacity: 1; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(0); }
        60% { opacity: 0; transform: translateY(5px); }
        100% { opacity: 0; transform: translateY(5px); }
        }
        .animate-flash {
            animation: appearDisappear 6s ease-in-out infinite;
        }

        /* เพิ่ม Animation สำหรับสลับชื่อและรูปภาพในปฏิทิน */
        @keyframes cfName {
            0%, 45% { opacity: 1; transform: scale(1); }
            50%, 95% { opacity: 0; transform: scale(0.9); pointer-events: none; }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes cfImage {
            0%, 45% { opacity: 0; transform: scale(0.9); pointer-events: none; }
            50%, 95% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); pointer-events: none; }
        }
        .animate-cf-name { animation: cfName 6s ease-in-out infinite; }
        .animate-cf-image { animation: cfImage 6s ease-in-out infinite; }
    </style>

        const SUPABASE_URL = "https://fzguxtchjsnirbwsrfoy.supabase.co";

        // สร้าง Supabase client (ถ้ายังไม่ได้ใส่ค่า จะเป็น null และแอปจะทำงานแบบออฟไลน์)
        const sb = (window.supabase && SUPABASE_URL && !SUPABASE_URL.includes("YOUR-PROJECT"))
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        // แปลง base64 (data URI) เป็น Blob เพื่ออัปโหลดเป็นไฟล์
        const dataUriToBlob = (dataUri) => {
            const [meta, b64] = dataUri.split(',');
            const mime = (meta.match(/data:(.*?);/) || [])[1] || 'image/jpeg';
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return new Blob([arr], { type: mime });
        };

        // อัปโหลดรูป (base64) ไปเก็บเป็นไฟล์ใน Supabase Storage แล้วคืน URL
        // ถ้าไม่ใช่ base64 (เป็น URL อยู่แล้ว) หรืออัปโหลดไม่สำเร็จ จะคืนค่าเดิมกลับไป
        const uploadPhoto = async (dataUri, keyId) => {
            if (!sb || !dataUri || !dataUri.startsWith('data:')) return dataUri || null;
            try {
                const blob = dataUriToBlob(dataUri);
                const path = `${keyId}_${Date.now()}.jpg`;
                const { error } = await sb.storage.from('avatars')
                    .upload(path, blob, { contentType: 'image/jpeg', upsert: true });
                if (error) throw error;
                const { data } = sb.storage.from('avatars').getPublicUrl(path);
                return data.publicUrl || dataUri;
            } catch (e) {
                console.warn('อัปโหลดรูปไป Storage ไม่สำเร็จ จะเก็บเป็น base64 แทน:', e.message);
                return dataUri; // สำรอง: ถ้า Storage ยังไม่พร้อม ยังลงทะเบียนได้โดยเก็บ base64
            }
        };

        const getDriveImgUrl = (url) => {
            if (!url) return null;
            if (url.startsWith('data:')) return url;                 // base64 จาก Supabase
            if (url.startsWith('http')) {
                if (url.includes('drive.google')) {                  // รองรับลิงก์ Drive เดิม
                    const idMatch = url.match(/[-\w]{25,}/);

                }
                return url;
            }
            return url;
        };

            Settings: (p) => <IconBase {...p} d={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Home: (p) => <IconBase {...p} d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />,
            LogOut: (p) => <IconBase {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>} />,
            Trash2: (p) => <IconBase {...p} d={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>} />,
            Loader2: (p) => <IconBase {...p} className={`animate-spin ${p.className || ''}`} d={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />,
            Cloud: (p) => <IconBase {...p} d={<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>} />,
            CloudOff: (p) => <IconBase {...p} d={<><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"/><line x1="1" y1="1" x2="23" y2="23"/></>} />,
            Lock: (p) => <IconBase {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />,
            UserCheck: (p) => <IconBase {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="8.5" cy="7" r="4" /><polyline points="17 11 19 13 23 9" /></>} />,
            Star: (p) => <IconBase {...p} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />} />,
            Info: (p) => <IconBase {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></>} />,
            Plus: (p) => <IconBase {...p} d={<><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>} />,
            Clock: (p) => <IconBase {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
            Edit: (p) => <IconBase {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />,
            Save: (p) => <IconBase {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />
        };

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const mockAdminDb = { username: 'admin', password: '123' };
            const [users, setUsers] = useState([]); 
            const [masterQueueIds, setMasterQueueIds] = useState([]);
            const updateMasterQueue = async (newQueueIds) => {
                setMasterQueueIds(newQueueIds);
                const queueObjects = newQueueIds.map(id => users.find(u => u.id === id)).filter(x=>x);
                await syncToDb({ action: 'saveMasterQueue', queue: queueObjects });
            };
            const [pendingUsers, setPendingUsers] = useState([]); 
            const [bookings, setBookings] = useState({}); 
            const [holidays, setHolidays] = useState({}); 
            const [settings, setSettings] = useState({ max_leaves_per_day: 5, default_quota: 10 });
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [currentView, setCurrentView] = useState('landing');
            const [isLoading, setIsLoading] = useState(false);
            const [isOnline, setIsOnline] = useState(false);
            const [adminCreds, setAdminCreds] = useState(null);
            const [otAssignments, setOtAssignments] = useState([]);
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

            const showModal = (title, message, type = 'alert', onConfirm = null) => {
                setModalConfig({ isOpen: true, title, message, type, onConfirm });
            };

            const closeModal = () => {
                setModalConfig({ ...modalConfig, isOpen: false });
            };

            useEffect(() => {
                if (sb) {
                    fetchData();
                }
            }, []);

            const [otHistory, setOtHistory] = useState([]);

            // Realtime: ฟังการเปลี่ยนแปลงของ bookings และ holidays
            // เมื่อมีใคร insert/update/delete ที่ฐานข้อมูล จะดึงตารางนั้นใหม่ทั้งก้อนทันที
            useEffect(() => {
                if (!sb) return;

                const refetchBookings = async () => {
                    const { data, error } = await sb.from('bookings').select('*');
                    if (error) return;
                    const bk = {};
                    (data || []).forEach(b => {
                        bk[`${b.date_key}_${b.user_id}`] = {
                            date: b.date_key,
                            userId: b.user_id,
                            userName: b.user_name,
                            type: b.type,
                            status: b.status,
                            amount: parseFloat(b.amount) || 1,
                        };
                    });
                    setBookings(bk);
                    setIsOnline(true);
                };

                const refetchHolidays = async () => {
                    const { data, error } = await sb.from('holidays').select('*');
                    if (error) return;
                    const hd = {};
                    (data || []).forEach(h => { hd[h.date_key] = h.status; });
                    setHolidays(hd);
                    setIsOnline(true);
                };

                const channel = sb
                    .channel('public:leave-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, refetchBookings)
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'holidays' }, refetchHolidays)
                    .subscribe();

                return () => { sb.removeChannel(channel); };
            }, []);

            const fetchData = async () => {
                if (!sb) { setIsOnline(false); return; }
                setIsLoading(true);
                try {
                    const [uRes, bRes, hRes, sRes, aRes, mRes, otRes, ohRes] = await Promise.all([
                        sb.from('app_users').select('*'),
                        sb.from('bookings').select('*'),
                        sb.from('holidays').select('*'),
                        sb.from('settings').select('*').limit(1),
                        sb.from('admin_account').select('*').limit(1),
                        sb.from('master_queue').select('*').order('position', { ascending: true }),
                        sb.from('ot_assignments').select('*'),
                        sb.from('ot_history').select('*'),
                    ]);

                    if (uRes.error) throw uRes.error;

                    // แยก users (อนุมัติแล้ว) กับ pendingUsers (รออนุมัติ)
                    const allUsers = (uRes.data || []).map(normalizeUser);
                    setUsers(allUsers.filter(u => u.approved));
                    setPendingUsers(allUsers.filter(u => !u.approved));

                    // bookings: แปลงเป็น object map key = `${dateKey}_${userId}`
                    const bk = {};
                    (bRes.data || []).forEach(b => {
                        bk[`${b.date_key}_${b.user_id}`] = {
                            date: b.date_key,
                            userId: b.user_id,
                            userName: b.user_name,
                            type: b.type,
                            status: b.status,
                            amount: parseFloat(b.amount) || 1,
                        };
                    });
                    setBookings(bk);

                    // holidays: object map key = dateKey
                    const hd = {};
                    (hRes.data || []).forEach(h => { hd[h.date_key] = h.status; });
                    setHolidays(hd);

                    if (sRes.data && sRes.data[0]) {
                        const s = sRes.data[0];
                        setSettings({
                            max_leaves_per_day: s.max_leaves_per_day,
                            default_quota: s.default_quota,
                            min_attendance_percent: s.min_attendance_percent,
                            min_advance_days: s.min_advance_days,
                            max_advance_months: s.max_advance_months,
                        });
                    }
                    if (aRes.data && aRes.data[0]) {
                        setAdminCreds({ username: aRes.data[0].username, password: aRes.data[0].password });
                    }

                    setMasterQueueIds((mRes.data || []).map(m => m.user_id));

                    setOtAssignments((otRes.data || []).map(o => ({
                        id: o.id, date: o.date, type: o.type, queueData: o.queue_data || []
                    })));

                    setOtHistory(ohRes.data || []);

                    setIsOnline(true);
                } catch (error) {
                    console.error("Connection Failed:", error);
                    setIsOnline(false);
                } finally {
                    setIsLoading(false);
                }
            };

            // ชั้นกลางสำหรับเขียนข้อมูลลง Supabase — รับ payload รูปแบบเดิม (มี action)
            // แล้ว map ไปยังคำสั่งของ Supabase เพื่อให้โค้ดส่วน UI เดิมไม่ต้องแก้
            const syncToDb = async (payload) => {
                if (!sb) return { status: 'success' };
                setIsLoading(true);
                try {
                    const a = payload.action;

                    if (a === 'register') {
                        const { action, ...u } = payload;
                        const row = {
                            id: u.id,
                            firstName: u.firstName || '',
                            lastName: u.lastName || '',
                            nickName: u.nickName || '',
                            phone: u.phone || '',
                            department: u.department || '',
                            password: u.password || '',
                            role: u.role || 'member',
                            quota: Number(u.quota) || 10,
                            photo: u.photo || null,
                            approved: false,
                        };
                        // อัปโหลดรูปไป Storage (ถ้าเป็น base64) แล้วเก็บเป็น URL
                        row.photo = await uploadPhoto(row.photo, row.id);
                        const { error } = await sb.from('app_users').insert(row);
                        if (error) throw error;
                        return { status: 'success', photoUrl: row.photo };
                    }

                    if (a === 'approveUser') {
                        const { error } = await sb.from('app_users')
                            .update({ approved: true }).eq('id', payload.userId);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'editUser') {
                        const { action, id, ...rest } = payload;
                        const allowed = ['firstName','lastName','nickName','phone','department','role','photo'];
                        const upd = {};
                        allowed.forEach(k => { if (rest[k] !== undefined) upd[k] = rest[k]; });
                        if (rest.quota !== undefined) upd.quota = Number(rest.quota) || 0;
                        if (rest.password) upd.password = rest.password; // เปลี่ยนรหัสเฉพาะตอนกรอกใหม่
                        // ถ้ามีรูปใหม่ (base64) อัปโหลดไป Storage แล้วเก็บเป็น URL
                        if (upd.photo) upd.photo = await uploadPhoto(upd.photo, id);
                        const { error } = await sb.from('app_users').update(upd).eq('id', id);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'deleteUser') {
                        await sb.from('bookings').delete().eq('user_id', payload.userId);
                        const { error } = await sb.from('app_users').delete().eq('id', payload.userId);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'saveSettings') {
                        const s = payload.settings || {};
                        const { error } = await sb.from('settings').upsert({
                            id: 1,
                            max_leaves_per_day: Number(s.max_leaves_per_day) || 5,
                            default_quota: Number(s.default_quota) || 10,
                            min_attendance_percent: Number(s.min_attendance_percent) || 96,
                            min_advance_days: (s.min_advance_days !== undefined && s.min_advance_days !== '') ? Number(s.min_advance_days) : 3,
                            max_advance_months: (s.max_advance_months !== undefined && s.max_advance_months !== '') ? Number(s.max_advance_months) : 3,
                        });
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'toggleBooking') {
                        if (payload.method === 'remove') {
                            const { error } = await sb.from('bookings').delete()
                                .eq('date_key', payload.dateKey)
                                .eq('user_id', payload.userId);
                            if (error) throw error;
                        } else {
                            const { error } = await sb.from('bookings').upsert({
                                date_key: payload.dateKey,
                                user_id: payload.userId,
                                user_name: payload.userName || '',
                                type: payload.type || 'vacation',
                                status: 'active',
                                amount: Number(payload.amount) || 1,
                            }, { onConflict: 'date_key,user_id' });
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'updateHoliday') {
                        if (payload.status === undefined || payload.status === null) {
                            const { error } = await sb.from('holidays').delete()
                                .eq('date_key', payload.dateKey);
                            if (error) throw error;
                        } else {
                            const { error } = await sb.from('holidays').upsert({
                                date_key: payload.dateKey,
                                status: payload.status,
                            }, { onConflict: 'date_key' });
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'saveMasterQueue') {
                        const queue = payload.queue || [];
                        // ล้างคิวเดิมทั้งหมดแล้วเขียนใหม่ตามลำดับ
                        await sb.from('master_queue').delete().gte('position', 0);
                        if (queue.length) {
                            const rows = queue.map((u, i) => ({ position: i, user_id: u.id }));
                            const { error } = await sb.from('master_queue').insert(rows);
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'createOT') {
                        const { action, ...rest } = payload;
                        const row = {
                            id: rest.id || ('ot_' + Date.now()),
                            date: rest.date || null,
                            type: rest.type || null,
                            queue_data: rest.queueData || [],
                        };
                        const { error } = await sb.from('ot_assignments').upsert(row);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'respondOT' || a === 'cancelOT') {
                        const { data: rows, error: e1 } = await sb.from('ot_assignments')
                            .select('*').eq('id', payload.otId).limit(1);
                        if (e1) throw e1;
                        const ot = rows && rows[0];
                        if (ot) {
                            let q = ot.queue_data || [];
                            const newStatus = (a === 'cancelOT') ? 'cancelled' : payload.response;
                            q = q.map(x => String(x.userId) === String(payload.userId)
                                ? { ...x, status: newStatus } : x);
                            // ถ้าปฏิเสธ ให้เลื่อนคนถัดไปที่ยัง waiting ขึ้นมาเป็น pending
                            if (a === 'respondOT' && payload.response === 'rejected') {
                                const idx = q.findIndex(x => x.status === 'waiting');
                                if (idx !== -1) q[idx].status = 'pending';
                            }
                            const { error: e2 } = await sb.from('ot_assignments')
                                .update({ queue_data: q }).eq('id', payload.otId);
                            if (e2) throw e2;
                        }
                        return { status: 'success' };
                    }

                    return { status: 'success' };
                } catch (error) {
                    console.error("Supabase action error:", error);
                    return { status: 'error', message: error.message || "เชื่อมต่อฐานข้อมูลไม่สำเร็จ" };
                } finally {
                    setIsLoading(false);
                }
            };

            const createOT = async (payload) => {
                const result = await syncToDb({ action: 'createOT', ...payload });
                if (result.status === 'success') fetchData();
                return result;
            };

            const respondOT = async (otId, userId, response) => {
                const updatedOT = otAssignments.map(ot => {
                    if(ot.id === otId) {
                        const newQueue = ot.queueData.map(q => {
                            if(String(q.userId) === String(userId)) return { ...q, status: response };
                            return q;
                        });
                        if(response === 'rejected') {
                             const nextIndex = newQueue.findIndex(q => q.status === 'waiting');
                             if(nextIndex !== -1) newQueue[nextIndex].status = 'pending';
                        }
                        return { ...ot, queueData: newQueue };
                    }
                    return ot;
                });
                setOtAssignments(updatedOT);

                const result = await syncToDb({ action: 'respondOT', otId, userId, response });
                if (result.status !== 'success') fetchData(); 
                return result;
            };

            const registerUser = async (userData) => {
                const newId = 'user_' + Date.now();
                const safeQuota = userData.quota ? Number(userData.quota) : 10;
                let newUser = { ...userData, id: newId, role: 'member', quota: safeQuota };

                if (sb) {
                    const result = await syncToDb({ action: 'register', ...newUser });
                    if (result.status !== 'success') {
                        return { success: false, message: result.message || "บันทึกข้อมูลไม่สำเร็จ" };
                    }
                    if (result.photoUrl) newUser.photo = result.photoUrl;
                }
                setPendingUsers(prev => [...prev, newUser]);
                return { success: true };
            };

            const approveUser = async (userId) => {
                const userToApprove = pendingUsers.find(u => u.id === userId);
                if (!userToApprove) return;
                const newPending = pendingUsers.filter(u => u.id !== userId);
                const newUsers = [...users, userToApprove];
                setPendingUsers(newPending);
                setUsers(newUsers);
                if (sb) await syncToDb({ action: 'approveUser', userId });
            };

            const adminEditUser = async (userData) => {
                // ไม่ทับ field ที่ส่งมาเป็นค่าว่าง (เช่น ไม่เปลี่ยนรหัสผ่าน) ในการอัปเดต state ชั่วคราว
                const merge = { ...userData };
                if (!merge.password) delete merge.password;

                const updatedUsers = users.map(u => u.id === userData.id ? { ...u, ...merge } : u);
                setUsers(updatedUsers);
                
                if (currentUser && currentUser.id === userData.id) {
                    setCurrentUser({ ...currentUser, ...merge });
                }

                const result = await syncToDb({ action: 'editUser', ...userData });
                if (result.status === 'success' && sb) fetchData(); // sync ค่าจริงจากฐานข้อมูล
                return result.status === 'success';
            };

            const adminUpdateSettings = async (newSettings) => {
                setSettings(newSettings);
                const result = await syncToDb({ action: 'saveSettings', settings: newSettings });
                return result.status === 'success';
            }

            const memberLogin = (userId, password) => {
                const user = users.find(u => u.id === userId);
                if (user && String(user.password) === String(password)) {
                    setCurrentUser(user);
                    setIsAdminLoggedIn(false);
                    setCurrentView('summary');
                    return true;
                }
                return false;
            };

            const adminLogin = (password) => { // รับแค่ password
                const creds = adminCreds || mockAdminDb; 

                // เช็คแค่รหัสผ่านให้ตรงกันเท่านั้น
                if (String(password).trim() === String(creds.password).trim()) {
                    const adminUser = { id: 'admin', firstName: 'Admin', nickName: 'System', role: 'admin' };
                    setCurrentUser(adminUser);
                    setIsAdminLoggedIn(true);
                    setCurrentView('adminDashboard');
                    return true;
                }
                return false;
            };

            const logout = () => {
                setCurrentUser(null);
                setIsAdminLoggedIn(false);
                setCurrentView('landing');
            };

            const toggleBooking = async (dateKey, user, type = 'vacation', forceAdmin = false, amount = 1.0) => {
                const uniqueKey = `${dateKey}_${user.id}`;
                const prevBookings = bookings;          // เก็บไว้เผื่อต้องถอยกลับ
                const newBookings = { ...bookings };
                let method = "";

                if (newBookings[uniqueKey]) {
                    delete newBookings[uniqueKey];
                    method = "remove";
                } else {
                    if (!forceAdmin) {
                        const userVacationCount = Object.values(bookings)
                            .filter(b => b.userId === user.id && b.type === 'vacation')
                            .reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);
                        
                        if (type === 'vacation' && (userVacationCount + amount) > user.quota) {
                            return { success: false, message: 'วันลาพักร้อนไม่พอ' };
                        }
                    }
                    
                    newBookings[uniqueKey] = { 
                        date: dateKey,
                        userId: user.id, 
                        userName: user.nickName, 
                        type: type, 
                        status: 'active', 
                        amount: amount 
                    };
                    method = "add";
                }

                setBookings(newBookings);
                
                if (sb) {
                    const result = await syncToDb({
                        action: 'toggleBooking',
                        method,
                        dateKey,
                        userId: user.id,
                        userName: user.nickName,
                        type,
                        force: forceAdmin,
                        amount
                    });
                    // ถ้าฐานข้อมูลปฏิเสธ (เช่น วันเต็มแล้ว) ให้ถอยรายการที่กดกลับ และแจ้งผู้ใช้
                    if (result && result.status === 'error') {
                        setBookings(prevBookings);
                        const isFull = (result.message || '').includes('FULL_DAY');
                        return {
                            success: false,
                            message: isFull

    const today = new Date();
    const dateKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
    
    // 🟢 ดึงข้อมูลคนลาวันนี้ (และกรองเอาเฉพาะคนที่สถานะ active)

    const uniqueLeaveUsers = [];
    const seenUserIds = new Set();

    todayBookings.forEach(b => {
        if (!seenUserIds.has(b.userId)) {
            seenUserIds.add(b.userId);
            const user = users.find(u => u.id === b.userId);
            uniqueLeaveUsers.push({

        const WeeklyForecast = () => {

                const days = [];
                let current = new Date();
                current.setDate(current.getDate() + 1); 
                
                while (days.length < 30) {
                    const dayOfWeek = current.getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
                        days.push(new Date(current));
                    }
                    current.setDate(current.getDate() + 1);
                }
                return days;
            };

            const forecastDays = getNextWorkingDays();

            return (
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">

                            const isHoliday = holidays[dateKey];
                            
                            const whoIsAway = Object.values(bookings).filter(b => b.date === dateKey);
                            
                            const awayCount = whoIsAway.length;
                            const totalUsers = users.length || 1;
                            const attendancePercent = isHoliday ? 0 : Math.round(((totalUsers - awayCount) / totalUsers) * 100);

                                            </div>

        const AdminStats = () => {
            const { users, bookings, holidays } = useContext(AppContext);

            const totalMembers = users.length;
            
            const totalQuota = users.reduce((sum, u) => sum + (parseFloat(u.quota) || 0), 0);
            
            const allBookings = Object.values(bookings);
            const totalVacationUsed = allBookings
                .filter(b => b.type === 'vacation') 
                .reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);

            const vacationPercent = totalQuota > 0 ? (totalVacationUsed / totalQuota) * 100 : 0;

            const calculateWorkingDays = () => {
                const year = new Date().getFullYear();
                const startOfYear = new Date(year, 0, 1);
                const endOfYear = new Date(year, 11, 31); 
                const today = new Date();
                today.setHours(0,0,0,0);

                let totalDays = 0;
                let remainingDays = 0;

                let tempDate = new Date(startOfYear);
                while (tempDate <= endOfYear) {
                    const dateKey = `${tempDate.getFullYear()}-${tempDate.getMonth() + 1}-${tempDate.getDate()}`;
                    const day = tempDate.getDay();
                    const isWeekend = day === 0 || day === 6; 
                    const isHoliday = !!holidays[dateKey]; 

                    if (!isWeekend && !isHoliday) {
                        totalDays++;
                        if (tempDate >= today) { 
                            remainingDays++;
                        }
                    }
                    tempDate.setDate(tempDate.getDate() + 1);
                }
                return { totalDays, remainingDays };
            };

            const { totalDays, remainingDays } = calculateWorkingDays();
            const workPercent = totalDays > 0 ? (remainingDays / totalDays) * 100 : 0;

            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const MAX_WIDTH = 800;
                            const scaleSize = MAX_WIDTH / img.width;
                            const width = (scaleSize < 1) ? MAX_WIDTH : img.width;
                            const height = (scaleSize < 1) ? img.height * scaleSize : img.height;

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                        };
                        img.onerror = (error) => reject(error);
                    };
                    reader.onerror = (error) => reject(error);
                });
            };

        const BookingView = () => {
            const { bookings, holidays, users, currentUser, toggleBooking, showModal, settings } = useContext(AppContext);
            const [selectedDate, setSelectedDate] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            
            const [leaveType, setLeaveType] = useState('vacation');
            const [leaveAmount, setLeaveAmount] = useState("1"); 
            const [isModalOpen, setIsModalOpen] = useState(false);

            const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 
                if (dayOfWeek === 0 || dayOfWeek === 6) return 'holiday_reg';
                
                const dateJan1 = new Date(year, 0, 1);
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) return 'work_B'; 
                else return 'work_A'; 
            };

            const getDayStatus = (day) => {
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                const dayType = holidays[dateKey] || getDefaultStatus(currentMonth.getFullYear(), currentMonth.getMonth() + 1, day);
                const isHoliday = (dayType === 'holiday_reg' || dayType === 'holiday_co'|| dayType === 'holiday_nonpro');
                
                
                const bookingsOnDate = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
                
                const maxLeaves = settings.max_leaves_per_day ? parseInt(settings.max_leaves_per_day) : 2; 

                let result = { 
                    status: 'available', 
                    type: dayType, 
                    text: '', 
                    bookers: bookingsOnDate, 
                    myBooking: null 
                };

                if (isHoliday) {
                    result.status = 'holiday';
                    // 🔴 แก้ไขส่วน if-else นี้
                    if (dayType === 'holiday_co') result.text = 'บ.หยุด';
                    else if (dayType === 'holiday_nonpro') result.text = 'Non Pro.';
                    else result.text = 'หยุด';
                    
                    return result;
                }

                const myBooking = bookingsOnDate.find(b => b.userId === currentUser.id);
                if (myBooking) {
                    result.status = 'booked';
                    result.myBooking = myBooking;
                    return result;
                }

                if (bookingsOnDate.length >= maxLeaves) {
                    result.status = 'full';
                    result.text = 'เต็ม'; 
                    return result;
                }

                return result;
            };

            const handleDateClick = (day) => {
                const status = getDayStatus(day);
                if (status.status === 'holiday' || status.status === 'full') return;
                
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                const selected = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                if (selected < today) return showModal("ผิดพลาด", "ไม่สามารถลาวันย้อนหลังได้", "alert");

                setSelectedDate(selected);
                
                if (status.status === 'booked') {
                     showModal("ยกเลิกวันลา", `ต้องการยกเลิกการลาวันที่ ${day} หรือไม่?`, "confirm", () => {
                        toggleBooking(dateKey, currentUser, 'vacation', false); 
                    });
                } else {
                    setLeaveType('vacation');
                    setLeaveAmount("1");
                    setIsModalOpen(true);
                }
            };

            const handleConfirm = async () => {
                if (!selectedDate) return;

                if (leaveType === 'vacation') {
                    const myBookings = Object.values(bookings).filter(b => b.userId === currentUser.id && b.type === 'vacation');
                    const used = myBookings.reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);
                    if (used + parseFloat(leaveAmount) > parseFloat(currentUser.quota)) {
                        setIsModalOpen(false);
                        return showModal("โควตาไม่พอ", "คุณใช้วันลาพักร้อนครบโควตาแล้ว", "alert");
                    }
                }

                const today = new Date();
                today.setHours(0,0,0,0);
                const diffTime = selectedDate.getTime() - today.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const minDays = settings.min_advance_days !== undefined ? parseInt(settings.min_advance_days) : 3;
                const maxMonths = settings.max_advance_months !== undefined ? parseInt(settings.max_advance_months) : 3;
                const maxDays = maxMonths * 30;

                if (diffDays < minDays) {
                    setIsModalOpen(false);
                    return showModal("ไม่สามารถจองวันลาได้", `หากต้องการลาติดต่อพี่ยู 088-6555893`, "alert");
                }

        const AdminPlanTab = () => {
            const { bookings, holidays, users, toggleBooking, showModal, adminForceCancel } = useContext(AppContext);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            
            // Modal States
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedDateKey, setSelectedDateKey] = useState('');
            const [selectedDateObj, setSelectedDateObj] = useState(null);
            
            const [viewMode, setViewMode] = useState('main'); 
            const [selectedUserId, setSelectedUserId] = useState('');
            const [leaveType, setLeaveType] = useState('vacation');
            const [leaveAmount, setLeaveAmount] = useState("1");

            const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            // เพิ่มฟังก์ชันคำนวณกะ A / กะ B สำหรับแอดมิน
            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 
                if (dayOfWeek === 0 || dayOfWeek === 6) return 'holiday_reg';
                
                const dateJan1 = new Date(year, 0, 1);
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) return 'work_B'; 
                else return 'work_A'; 
            };

            const getDayStatus = (day) => {
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                // ดึงประเภทของวันมาใช้
                const dayType = holidays[dateKey] || getDefaultStatus(currentMonth.getFullYear(), currentMonth.getMonth() + 1, day);
                const isHoliday = (dayType === 'holiday_reg' || dayType === 'holiday_co'|| dayType === 'holiday_nonpro');
                const bookingsOnDate = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
                return { isHoliday, dayType, bookingsOnDate };
            };

            const handleDayClick = (day) => {
                const dateObj = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                const dateKey = `${dateObj.getFullYear()}-${dateObj.getMonth() + 1}-${dateObj.getDate()}`;
                setSelectedDateObj(dateObj);
                setSelectedDateKey(dateKey);
                setViewMode('main');
                setIsModalOpen(true);
            };

            const handleSaveLeave = async () => {
                const targetUser = users.find(u => u.id === selectedUserId);
                if (!targetUser) return showModal("ผิดพลาด", "ไม่พบข้อมูลสมาชิก", "alert");
                
                const result = await toggleBooking(selectedDateKey, targetUser, leaveType, true, parseFloat(leaveAmount));
                if (result.success) {
                    setViewMode('main'); 
                    showModal("สำเร็จ", "จองวันลาให้สมาชิกเรียบร้อยแล้ว", "alert"); 
                } else {
                    showModal("ผิดพลาด", result.message, "alert");
                }
            };

            const renderCalendar = () => {
                const days = [];
                const totalDays = daysInMonth(currentMonth);
                const startDay = firstDayOfMonth(currentMonth);

                for (let i = 0; i < startDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-14"></div>);
                }

                for (let i = 1; i <= totalDays; i++) {
                    const { isHoliday, dayType, bookingsOnDate } = getDayStatus(i);
                    
                    // กำหนดสีตามประเภทของวัน
                    let bgClass = "bg-white border-slate-100 text-slate-700 hover:bg-slate-50";
                    if (dayType === 'work_A') bgClass = "bg-yellow-50 border-yellow-100 text-yellow-800 hover:bg-yellow-100";
                    else if (dayType === 'work_B') bgClass = "bg-emerald-50 border-emerald-100 text-emerald-800 hover:bg-emerald-100";
                    else if (dayType === 'holiday_reg') bgClass = "bg-slate-100 border-slate-200 text-slate-400 opacity-80";
                    else if (dayType === 'holiday_co') bgClass = "bg-pink-50 border-pink-100 text-pink-600 hover:bg-pink-100 opacity-90";
                    else if (dayType === 'holiday_nonpro') bgClass = "bg-gradient-to-br from-rose-100 via-fuchsia-100 to-indigo-100 border-purple-200 text-purple-700 hover:opacity-80 opacity-90";
                    
                    const today = new Date();
                    const isToday = today.getDate() === i && today.getMonth() === currentMonth.getMonth() && today.getFullYear() === currentMonth.getFullYear();

                    days.push(
                        <div key={i} onClick={() => handleDayClick(i)} className={`h-14 rounded-xl border flex flex-col items-center justify-start pt-1 relative cursor-pointer transition-all active:scale-95 ${bgClass} ${isToday ? 'ring-2 ring-blue-500 ring-offset-2 z-10' : ''}`}>
                            <span className="text-sm font-bold leading-none">{i}</span>
                            
                            <div className="mt-0.5 flex flex-col items-center w-full px-0.5 space-y-0.5">
                                {isHoliday && <span className="text-[8px] font-bold mt-1 text-center truncate w-full">
                                    {dayType === 'holiday_co' ? 'บ.หยุด' : (dayType === 'holiday_nonpro' ? 'Non Pro.' : 'หยุด')}
                                </span>}
                                {!isHoliday && bookingsOnDate && bookingsOnDate.length > 0 && (
                                    bookingsOnDate.slice(0, 3).map((b, idx) => {
                                        const bookerUser = users.find(u => u.id === b.userId);
                                        const displayFirstName = bookerUser ? bookerUser.firstName.split(' ')[0] : b.userName.split(' ')[0];
                                        const photoUrl = bookerUser ? getDriveImgUrl(bookerUser.photo) : null;
                                        return (

                     min_advance_days: parseInt(localSettings.min_advance_days),     
                     max_advance_months: parseInt(localSettings.max_advance_months)

                 const ok = await adminUpdateSettings(updates);

                     ok ? "สำเร็จ" : "ผิดพลาด",
                     ok ? "บันทึกการตั้งค่าเรียบร้อยแล้ว" : "บันทึกไม่สำเร็จ กรุณาลองใหม่อีกครั้ง",

                        setIsBookingModalOpen(false);

                                                value={localSettings.min_advance_days || 0} 
                                                onChange={e => setLocalSettings({...localSettings, min_advance_days: e.target.value})}
                                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                                <span>0 วัน (ลาทันที)</span>
                                                <span>30 วัน</span>
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between mb-2">
                                                <label className="text-xs font-bold text-slate-500">จองได้ไกลสุดไม่เกิน (Max)</label>
                                                <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">{localSettings.max_advance_months || 3} เดือน</span>
                                            </div>
                                            <input 
                                                type="range" min="1" max="12" 
                                                value={localSettings.max_advance_months || 3} 
                                                onChange={e => setLocalSettings({...localSettings, max_advance_months: e.target.value})}
                                                className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                                            />
                                            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                                <span>1 เดือน</span>
                                                <span>1 ปี</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">จำนวนคนที่ลาได้สูงสุดต่อวัน</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg" value={localSettings.max_leaves_per_day || 2} onChange={e => setLocalSettings({...localSettings, max_leaves_per_day: e.target.value})} />
                                            <span className="text-slate-400 text-sm">คน/วัน</span>
                                        </div>
                                    </div>
                                    <div className="h-px bg-slate-100"></div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">เป้าหมายการมาทำงานขั้นต่ำ (%)</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg text-blue-600" value={localSettings.min_attendance_percent || 96} onChange={e => setLocalSettings({...localSettings, min_attendance_percent: e.target.value})} />
                                            <span className="text-slate-400 text-sm">% (Attendance Target)</span>
                                        </div>
                                    </div>
                                    <div className="h-px bg-slate-100"></div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-700 mb-2">โควตาวันลาพักร้อนเริ่มต้น</label>
                                        <div className="flex items-center gap-4">
                                            <input type="number" className="p-3 bg-slate-50 border border-slate-200 rounded-xl w-24 text-center font-bold text-lg" value={localSettings.default_quota || 10} onChange={e => setLocalSettings({...localSettings, default_quota: e.target.value})} />
                                            <span className="text-slate-400 text-sm">วัน/ปี</span>
                                        </div>
                                    </div>
                                    <button onClick={handleSaveSettings} className="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold shadow-lg hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2"><Icons.Save /> บันทึกการตั้งค่า</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminCalendar = () => {
            const { holidays, toggleHoliday, syncToDb } = useContext(AppContext);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [modalConfig, setModalConfig] = useState({ isOpen: false, dateKey: '', dateStr: '', currentStatus: null });

            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDay = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            
            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 

                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    return 'holiday_reg';
                }
                
                const dateJan1 = new Date(year, 0, 1);
                
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) { 
                    return 'work_B'; 
                } else {
                    return 'work_A'; 
                }
            };
            
            const handleDayClick = (day) => {
                const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                const dateObj = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                
                const status = holidays[dateKey] || getDefaultStatus(currentDate.getFullYear(), currentDate.getMonth() + 1, day);

                setModalConfig({
                    isOpen: true,
                    dateKey,
                    dateStr: dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric'}),
                    currentStatus: status
                });
            };

            const handleSaveStatus = async (dateKey, status) => {
                setModalConfig({ ...modalConfig, isOpen: false });
                
                const result = await toggleHoliday(dateKey, status); 
                if (result.status === 'success') {
                } else {
                    alert('บันทึกไม่สำเร็จ');
                }
            };
            
            const getStatusClasses = (status) => {
                if (status === 'work_B') return "bg-emerald-100 text-emerald-700 border-emerald-200 font-bold";
                if (status === 'work_A') return "bg-yellow-100 text-yellow-700 border-yellow-200 font-bold";
                if (status === 'holiday_reg') return "bg-slate-300 text-slate-700 border-slate-400";
                if (status === 'holiday_co') return "bg-pink-100 text-pink-700 border-pink-200 font-bold";
                if (status === 'holiday_nonpro') return "bg-gradient-to-br from-rose-100 via-fuchsia-100 to-indigo-100 text-purple-700 border-purple-200 font-bold";
                return "bg-white border-slate-200 text-slate-700";
            }

            const getStatusLabel = (status) => {
                if (status === 'work_B') return 'กะ B';
                if (status === 'work_A') return 'กะ A';
                if (status === 'holiday_reg') return 'หยุด';
                if (status === 'holiday_co') return 'บ.หยุด';
                if (status === 'holiday_nonpro') return 'Non Pro.';
                return '';
            }

            const renderCalendar = () => {
                const days = [];
                const totalDays = getDaysInMonth(currentDate);
                const firstDay = getFirstDay(currentDate);

                for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`}></div>);

                for (let day = 1; day <= totalDays; day++) {
                    const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                    const status = holidays[dateKey] || getDefaultStatus(currentDate.getFullYear(), currentDate.getMonth() + 1, day); 
                    const bg = getStatusClasses(status);
                    
                    days.push(
                        <div key={day} onClick={() => handleDayClick(day)} className={`aspect-square m-1 rounded-xl border flex flex-col items-center justify-center cursor-pointer transition-all active:scale-95 text-xs ${bg}`}>
                            <span className="text-xl font-bold">{day}</span>
                            <span className="text-[10px] font-bold mt-[-4px]">{getStatusLabel(status)}</span>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="min-h-screen bg-slate-100 p-6 pb-32 animate-in">
                    {modalConfig.isOpen && (
                        <ShiftSelectionModal 
                            dateStr={modalConfig.dateStr}
                            dateKey={modalConfig.dateKey}
                            currentStatus={modalConfig.currentStatus}
                            onClose={() => setModalConfig({...modalConfig, isOpen: false})}
                            onSaveStatus={handleSaveStatus}
                        />
                    )}
                    
                    <h2 className="text-2xl font-black text-slate-800 mb-6">จัดการกะ/วันหยุด</h2>
                    <div className="bg-white p-4 rounded-2xl shadow-sm mb-4 text-xs text-slate-500">
                        <span className="font-bold">วิธีใช้:</span> กดที่วันที่เพื่อกำหนดกะทำงาน (A/B) หรือวันหยุด (พนักงานจะลาในวันหยุดไม่ได้)
                    </div>
                    
                    <div className="flex gap-3 justify-center text-xs mb-4 flex-wrap">
                        <span className="flex items-center gap-1 font-bold text-emerald-700"><div className="w-3 h-3 bg-emerald-500 rounded-full"></div> กะ B</span>
                        <span className="flex items-center gap-1 font-bold text-yellow-700"><div className="w-3 h-3 bg-yellow-500 rounded-full"></div> กะ A</span>
                        <span className="flex items-center gap-1 font-bold text-slate-500"><div className="w-3 h-3 bg-slate-400 rounded-full"></div> หยุดปกติ</span>
                        <span className="flex items-center gap-1 font-bold text-pink-700"><div className="w-3 h-3 bg-pink-500 rounded-full"></div> หยุด บ.</span>
                        <span className="flex items-center gap-1 font-bold text-purple-700"><div className="w-3 h-3 bg-gradient-to-br from-rose-400 via-fuchsia-500 to-indigo-500 rounded-full"></div> Non Pro.</span>
                    </div>

                    <div className="bg-white rounded-[2rem] shadow-xl overflow-hidden">
                        <div className="p-4 flex justify-between items-center border-b border-slate-100">
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()-1)))}><Icons.ChevronLeft className="text-slate-400 hover:text-slate-600"/></button>
                            <h2 className="font-bold text-slate-700">{currentDate.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}</h2>
                            <button onClick={() => setCurrentDate(new Date(currentDate.setMonth(currentDate.getMonth()+1)))}><Icons.ChevronRight className="text-slate-400 hover:text-slate-600"/></button>
                        </div>
                        <div className="grid grid-cols-7 gap-1 p-2 text-center text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">
                             <span className="text-red-300">อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span className="text-blue-300">ส</span>
                        </div>
                        <div className="grid grid-cols-7 gap-1 p-2">
                            {renderCalendar()}
                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const { currentView, isLoading } = useContext(AppContext);
            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative shadow-2xl overflow-hidden">
                    <CustomModal /> 

                    {isLoading && <LoadingOverlay />}
                    {currentView === 'landing' && <LandingView />}
                    {currentView === 'adminLogin' && <AdminLoginView />}
                    {currentView === 'register' && <RegisterView />}
                    
                    {currentView === 'summary' && <><SummaryView /><BottomNav /></>}
                    {currentView === 'booking' && <><BookingView /><BottomNav /></>}
                    
                    {currentView === 'adminDashboard' && <><AdminDashboard /><BottomNav /></>}
                    {currentView === 'adminCalendar' && <><AdminCalendar /><BottomNav /></>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>

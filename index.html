        0% { opacity: 0; transform: translateY(5px); }
        10% { opacity: 1; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(0); }
        60% { opacity: 0; transform: translateY(5px); }

            animation: appearDisappear 6s ease-in-out infinite;

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef } = React;

        // ----------------------------------------------------------------------
        // ⚠️ SETUP: ใส่ค่าจากโปรเจกต์ Supabase ของคุณที่นี่
        //   หาได้จาก Supabase Dashboard > Project Settings > API
        const SUPABASE_URL = "https://fzguxtchjsnirbwsrfoy.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GvuA9YgKWN_Gy946Y_Z6Mg_QGLaR73y";
        // ----------------------------------------------------------------------

        // สร้าง Supabase client (ถ้ายังไม่ได้ใส่ค่า จะเป็น null และแอปจะทำงานแบบออฟไลน์)
        const sb = (window.supabase && SUPABASE_URL && !SUPABASE_URL.includes("YOUR-PROJECT"))
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;

        // แปลง base64 (data URI) เป็น Blob เพื่ออัปโหลดเป็นไฟล์
        const dataUriToBlob = (dataUri) => {
            const [meta, b64] = dataUri.split(',');
            const mime = (meta.match(/data:(.*?);/) || [])[1] || 'image/jpeg';
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            return new Blob([arr], { type: mime });
        };

        // อัปโหลดรูป (base64) ไปเก็บเป็นไฟล์ใน Supabase Storage แล้วคืน URL
        // ถ้าไม่ใช่ base64 (เป็น URL อยู่แล้ว) หรืออัปโหลดไม่สำเร็จ จะคืนค่าเดิมกลับไป
        const uploadPhoto = async (dataUri, keyId) => {
            if (!sb || !dataUri || !dataUri.startsWith('data:')) return dataUri || null;
            try {
                const blob = dataUriToBlob(dataUri);
                const path = `${keyId}_${Date.now()}.jpg`;
                const { error } = await sb.storage.from('avatars')
                    .upload(path, blob, { contentType: 'image/jpeg', upsert: true });
                if (error) throw error;
                const { data } = sb.storage.from('avatars').getPublicUrl(path);
                return data.publicUrl || dataUri;
            } catch (e) {
                console.warn('อัปโหลดรูปไป Storage ไม่สำเร็จ จะเก็บเป็น base64 แทน:', e.message);
                return dataUri; // สำรอง: ถ้า Storage ยังไม่พร้อม ยังลงทะเบียนได้โดยเก็บ base64
            }
        };

        // แปลง user record จาก DB ให้เป็นรูปแบบที่ UI ใช้ (ชนิดข้อมูลให้ถูกต้อง)
        const normalizeUser = (u) => ({
            ...u,
            quota: parseFloat(u.quota) || 0,
            approved: !!u.approved,
        });

        // รูปโปรไฟล์: ตอนนี้เก็บเป็น base64 (data URI) ตรงๆ ใน Supabase
        // ฟังก์ชันนี้รองรับทั้งรูปแบบใหม่ (data:) และข้อมูลเก่าจาก Google Drive
        const getDriveImgUrl = (url) => {
            if (!url) return null;
            if (url.startsWith('data:')) return url;                 // base64 จาก Supabase
            if (url.startsWith('http')) {
                if (url.includes('drive.google')) {                  // รองรับลิงก์ Drive เดิม
                    const idMatch = url.match(/[-\w]{25,}/);
                    if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[0]}&sz=w1000`;
                }
                return url;
            }
            return url;
        };

        const IconBase = ({ d, size = 24, className = "" }) => (

        );
        const Icons = {

            ListOrdered: (p) => <IconBase {...p} d={<><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></>} />,

            User: (p) => <IconBase {...p} d={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
            CheckCircle: (p) => <IconBase {...p} d={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
            Check: (p) => <IconBase {...p} d={<polyline points="20 6 9 17 4 12"/>} />,
            Calendar: (p) => <IconBase {...p} d={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>} />,
            Settings: (p) => <IconBase {...p} d={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Home: (p) => <IconBase {...p} d={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />,
            LogOut: (p) => <IconBase {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>} />,
            Trash2: (p) => <IconBase {...p} d={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>} />,
            Loader2: (p) => <IconBase {...p} className={`animate-spin ${p.className || ''}`} d={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />,
            Cloud: (p) => <IconBase {...p} d={<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>} />,
            CloudOff: (p) => <IconBase {...p} d={<><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"/><line x1="1" y1="1" x2="23" y2="23"/></>} />,
            Lock: (p) => <IconBase {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />,
            UserCheck: (p) => <IconBase {...p} d={<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" /><circle cx="8.5" cy="7" r="4" /><polyline points="17 11 19 13 23 9" /></>} />,
            Star: (p) => <IconBase {...p} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />} />,
            Info: (p) => <IconBase {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></>} />,
            Plus: (p) => <IconBase {...p} d={<><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>} />,
            Clock: (p) => <IconBase {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
            Edit: (p) => <IconBase {...p} d={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>} />,
            Save: (p) => <IconBase {...p} d={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />
        };

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const mockAdminDb = { username: 'admin', password: '123' };
            const [users, setUsers] = useState([]); 
            const [masterQueueIds, setMasterQueueIds] = useState([]);
            const updateMasterQueue = async (newQueueIds) => {
                setMasterQueueIds(newQueueIds);
                const queueObjects = newQueueIds.map(id => users.find(u => u.id === id)).filter(x=>x);
                await syncToDb({ action: 'saveMasterQueue', queue: queueObjects });
            };
            const [pendingUsers, setPendingUsers] = useState([]); 
            const [bookings, setBookings] = useState({}); 
            const [holidays, setHolidays] = useState({}); 
            const [settings, setSettings] = useState({ max_leaves_per_day: 5, default_quota: 10 });
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [currentView, setCurrentView] = useState('landing');
            const [isLoading, setIsLoading] = useState(false);
            const [isOnline, setIsOnline] = useState(false);
            const [adminCreds, setAdminCreds] = useState(null);
            const [otAssignments, setOtAssignments] = useState([]);
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

            const showModal = (title, message, type = 'alert', onConfirm = null) => {
                setModalConfig({ isOpen: true, title, message, type, onConfirm });
            };

            const closeModal = () => {
                setModalConfig({ ...modalConfig, isOpen: false });
            };

            useEffect(() => {
                if (sb) {
                    fetchData();
                }
            }, []);

            const [otHistory, setOtHistory] = useState([]);
                useEffect(() => {
                if (isOnline && sb) {
                    // อัปเดตข้อมูล OT อัตโนมัติทุก 5 วินาที (sync ข้ามอุปกรณ์)
                    const interval = setInterval(async () => {
                        try {
                            const [otRes, ohRes] = await Promise.all([
                                sb.from('ot_assignments').select('*'),
                                sb.from('ot_history').select('*'),
                            ]);
                            if (!otRes.error) {
                                setOtAssignments((otRes.data || []).map(o => ({
                                    id: o.id, date: o.date, type: o.type, queueData: o.queue_data || []
                                })));
                            }
                            if (!ohRes.error) setOtHistory(ohRes.data || []);
                            setIsOnline(true);
                        } catch (err) {
                            console.error("Auto fetch error", err);
                        }
                    }, 5000);
                    return () => clearInterval(interval);
                }
            }, [isOnline]);

            const fetchData = async () => {
                if (!sb) { setIsOnline(false); return; }
                setIsLoading(true);
                try {
                    const [uRes, bRes, hRes, sRes, aRes, mRes, otRes, ohRes] = await Promise.all([
                        sb.from('app_users').select('*'),
                        sb.from('bookings').select('*'),
                        sb.from('holidays').select('*'),
                        sb.from('settings').select('*').limit(1),
                        sb.from('admin_account').select('*').limit(1),
                        sb.from('master_queue').select('*').order('position', { ascending: true }),
                        sb.from('ot_assignments').select('*'),
                        sb.from('ot_history').select('*'),
                    ]);

                    if (uRes.error) throw uRes.error;

                    // แยก users (อนุมัติแล้ว) กับ pendingUsers (รออนุมัติ)
                    const allUsers = (uRes.data || []).map(normalizeUser);
                    setUsers(allUsers.filter(u => u.approved));
                    setPendingUsers(allUsers.filter(u => !u.approved));

                    // bookings: แปลงเป็น object map key = `${dateKey}_${userId}`
                    const bk = {};
                    (bRes.data || []).forEach(b => {
                        bk[`${b.date_key}_${b.user_id}`] = {
                            date: b.date_key,
                            userId: b.user_id,
                            userName: b.user_name,
                            type: b.type,
                            status: b.status,
                            amount: parseFloat(b.amount) || 1,
                        };
                    });
                    setBookings(bk);

                    // holidays: object map key = dateKey
                    const hd = {};
                    (hRes.data || []).forEach(h => { hd[h.date_key] = h.status; });
                    setHolidays(hd);

                    if (sRes.data && sRes.data[0]) {
                        const s = sRes.data[0];
                        setSettings({
                            max_leaves_per_day: s.max_leaves_per_day,
                            default_quota: s.default_quota,
                            min_attendance_percent: s.min_attendance_percent,
                            min_advance_days: s.min_advance_days,
                            max_advance_months: s.max_advance_months,
                        });
                    }
                    if (aRes.data && aRes.data[0]) {
                        setAdminCreds({ username: aRes.data[0].username, password: aRes.data[0].password });
                    }

                    setMasterQueueIds((mRes.data || []).map(m => m.user_id));

                    setOtAssignments((otRes.data || []).map(o => ({
                        id: o.id, date: o.date, type: o.type, queueData: o.queue_data || []
                    })));

                    setOtHistory(ohRes.data || []);

                    setIsOnline(true);
                } catch (error) {
                    console.error("Connection Failed:", error);
                    setIsOnline(false);
                } finally {
                    setIsLoading(false);
                }
            };

            // ชั้นกลางสำหรับเขียนข้อมูลลง Supabase — รับ payload รูปแบบเดิม (มี action)
            // แล้ว map ไปยังคำสั่งของ Supabase เพื่อให้โค้ดส่วน UI เดิมไม่ต้องแก้
            const syncToDb = async (payload) => {
                if (!sb) return { status: 'success' };
                setIsLoading(true);
                try {
                    const a = payload.action;

                    if (a === 'register') {
                        const { action, ...u } = payload;
                        const row = {
                            id: u.id,
                            firstName: u.firstName || '',
                            lastName: u.lastName || '',
                            nickName: u.nickName || '',
                            phone: u.phone || '',
                            department: u.department || '',
                            password: u.password || '',
                            role: u.role || 'member',
                            quota: Number(u.quota) || 10,
                            photo: u.photo || null,
                            approved: false,
                        };
                        // อัปโหลดรูปไป Storage (ถ้าเป็น base64) แล้วเก็บเป็น URL
                        row.photo = await uploadPhoto(row.photo, row.id);
                        const { error } = await sb.from('app_users').insert(row);
                        if (error) throw error;
                        return { status: 'success', photoUrl: row.photo };
                    }

                    if (a === 'approveUser') {
                        const { error } = await sb.from('app_users')
                            .update({ approved: true }).eq('id', payload.userId);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'editUser') {
                        const { action, id, ...rest } = payload;
                        const allowed = ['firstName','lastName','nickName','phone','department','role','photo'];
                        const upd = {};
                        allowed.forEach(k => { if (rest[k] !== undefined) upd[k] = rest[k]; });
                        if (rest.quota !== undefined) upd.quota = Number(rest.quota) || 0;
                        if (rest.password) upd.password = rest.password; // เปลี่ยนรหัสเฉพาะตอนกรอกใหม่
                        // ถ้ามีรูปใหม่ (base64) อัปโหลดไป Storage แล้วเก็บเป็น URL
                        if (upd.photo) upd.photo = await uploadPhoto(upd.photo, id);
                        const { error } = await sb.from('app_users').update(upd).eq('id', id);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'deleteUser') {
                        await sb.from('bookings').delete().eq('user_id', payload.userId);
                        const { error } = await sb.from('app_users').delete().eq('id', payload.userId);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'saveSettings') {
                        const s = payload.settings || {};
                        const { error } = await sb.from('settings').upsert({
                            id: 1,
                            max_leaves_per_day: Number(s.max_leaves_per_day) || 5,
                            default_quota: Number(s.default_quota) || 10,
                            min_attendance_percent: Number(s.min_attendance_percent) || 96,
                            min_advance_days: (s.min_advance_days !== undefined && s.min_advance_days !== '') ? Number(s.min_advance_days) : 3,
                            max_advance_months: (s.max_advance_months !== undefined && s.max_advance_months !== '') ? Number(s.max_advance_months) : 3,
                        });
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'toggleBooking') {
                        if (payload.method === 'remove') {
                            const { error } = await sb.from('bookings').delete()
                                .eq('date_key', payload.dateKey)
                                .eq('user_id', payload.userId);
                            if (error) throw error;
                        } else {
                            const { error } = await sb.from('bookings').upsert({
                                date_key: payload.dateKey,
                                user_id: payload.userId,
                                user_name: payload.userName || '',
                                type: payload.type || 'vacation',
                                status: 'active',
                                amount: Number(payload.amount) || 1,
                            }, { onConflict: 'date_key,user_id' });
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'updateHoliday') {
                        if (payload.status === undefined || payload.status === null) {
                            const { error } = await sb.from('holidays').delete()
                                .eq('date_key', payload.dateKey);
                            if (error) throw error;
                        } else {
                            const { error } = await sb.from('holidays').upsert({
                                date_key: payload.dateKey,
                                status: payload.status,
                            }, { onConflict: 'date_key' });
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'saveMasterQueue') {
                        const queue = payload.queue || [];
                        // ล้างคิวเดิมทั้งหมดแล้วเขียนใหม่ตามลำดับ
                        await sb.from('master_queue').delete().gte('position', 0);
                        if (queue.length) {
                            const rows = queue.map((u, i) => ({ position: i, user_id: u.id }));
                            const { error } = await sb.from('master_queue').insert(rows);
                            if (error) throw error;
                        }
                        return { status: 'success' };
                    }

                    if (a === 'createOT') {
                        const { action, ...rest } = payload;
                        const row = {
                            id: rest.id || ('ot_' + Date.now()),
                            date: rest.date || null,
                            type: rest.type || null,
                            queue_data: rest.queueData || [],
                        };
                        const { error } = await sb.from('ot_assignments').upsert(row);
                        if (error) throw error;
                        return { status: 'success' };
                    }

                    if (a === 'respondOT' || a === 'cancelOT') {
                        const { data: rows, error: e1 } = await sb.from('ot_assignments')
                            .select('*').eq('id', payload.otId).limit(1);
                        if (e1) throw e1;
                        const ot = rows && rows[0];
                        if (ot) {
                            let q = ot.queue_data || [];
                            const newStatus = (a === 'cancelOT') ? 'cancelled' : payload.response;
                            q = q.map(x => String(x.userId) === String(payload.userId)
                                ? { ...x, status: newStatus } : x);
                            // ถ้าปฏิเสธ ให้เลื่อนคนถัดไปที่ยัง waiting ขึ้นมาเป็น pending
                            if (a === 'respondOT' && payload.response === 'rejected') {
                                const idx = q.findIndex(x => x.status === 'waiting');
                                if (idx !== -1) q[idx].status = 'pending';
                            }
                            const { error: e2 } = await sb.from('ot_assignments')
                                .update({ queue_data: q }).eq('id', payload.otId);
                            if (e2) throw e2;
                        }
                        return { status: 'success' };
                    }

                    return { status: 'success' };
                } catch (error) {
                    console.error("Supabase action error:", error);
                    return { status: 'error', message: error.message || "เชื่อมต่อฐานข้อมูลไม่สำเร็จ" };
                } finally {
                    setIsLoading(false);
                }
            };

            const createOT = async (payload) => {
                const result = await syncToDb({ action: 'createOT', ...payload });
                if (result.status === 'success') fetchData();
                return result;
            };

            const respondOT = async (otId, userId, response) => {
                const updatedOT = otAssignments.map(ot => {
                    if(ot.id === otId) {
                        const newQueue = ot.queueData.map(q => {
                            if(String(q.userId) === String(userId)) return { ...q, status: response };
                            return q;
                        });
                        if(response === 'rejected') {
                             const nextIndex = newQueue.findIndex(q => q.status === 'waiting');
                             if(nextIndex !== -1) newQueue[nextIndex].status = 'pending';
                        }
                        return { ...ot, queueData: newQueue };
                    }
                    return ot;
                });
                setOtAssignments(updatedOT);

                const result = await syncToDb({ action: 'respondOT', otId, userId, response });
                if (result.status !== 'success') fetchData(); 
                return result;
            };

            const registerUser = async (userData) => {
                const newId = 'user_' + Date.now();
                const safeQuota = userData.quota ? Number(userData.quota) : 10;

                if (sb) {

                        return { success: false, message: result.message || "บันทึกข้อมูลไม่สำเร็จ" };
                    }

                setPendingUsers(prev => [...prev, newUser]);

                return result.status === 'success';
            };

                const result = await syncToDb({ action: 'saveSettings', settings: newSettings });
                return result.status === 'success';

            const memberLogin = (userId, password) => {

                const creds = adminCreds || mockAdminDb; 

                // เช็คแค่รหัสผ่านให้ตรงกันเท่านั้น

                    setCurrentUser(adminUser);

                    setCurrentView('adminDashboard');
                    return true;
                }
                return false;
            };

            const logout = () => {
                setCurrentUser(null);
                setIsAdminLoggedIn(false);
                setCurrentView('landing');
            };

            const toggleBooking = async (dateKey, user, type = 'vacation', forceAdmin = false, amount = 1.0) => {
                const uniqueKey = `${dateKey}_${user.id}`;
                const newBookings = { ...bookings };
                let method = "";

                if (newBookings[uniqueKey]) {
                    delete newBookings[uniqueKey];
                    method = "remove";
                } else {
                    if (!forceAdmin) {
                        const userVacationCount = Object.values(bookings)
                            .filter(b => b.userId === user.id && b.type === 'vacation')
                            .reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);
                        
                        if (type === 'vacation' && (userVacationCount + amount) > user.quota) {
                            return { success: false, message: 'วันลาพักร้อนไม่พอ' };
                        }
                    }
                    
                    newBookings[uniqueKey] = { 
                        date: dateKey,
                        userId: user.id, 
                        userName: user.nickName, 
                        type: type, 
                        status: 'active', 
                        amount: amount 
                    };
                    method = "add";
                }

                setBookings(newBookings);
                
                if (sb) {
                    syncToDb({
                        action: 'toggleBooking',
                        method,
                        dateKey,
                        userId: user.id,
                        userName: user.nickName,
                        type,
                        force: forceAdmin,
                        amount
                    });
                }
                return { success: true, message: method === "add" ? 'จองสำเร็จ' : 'ยกเลิกสำเร็จ' };
            };

            const toggleHoliday = async (dateKey, status) => { 
                const newHolidays = { ...holidays };
                
                if (status === null) {
                    delete newHolidays[dateKey]; 
                } else {
                    newHolidays[dateKey] = status;

                setHolidays(newHolidays);
                
                if (sb) await syncToDb({ action: 'updateHoliday', dateKey, status: newHolidays[dateKey] });
                
                return { status: 'success' };
            };

                        method: 'remove', 
                        dateKey: dateKey,
                        userId: userId,   
                        force: true

                });
            };

                <AppContext.Provider value={{

                }}>
                    {children}

        const AttendanceCard = () => {
    // อย่าลืมดึงตัวแปร getDriveImgUrl มาใช้ ถ้ามีการแยกไฟล์ (แต่ถ้าอยู่ในไฟล์เดียวกันสามารถเรียกใช้ได้เลย)
    const { users, bookings, settings } = useContext(AppContext); 
    
    const today = new Date();
    const dateKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
    
    // 🟢 ดึงข้อมูลคนลาวันนี้ (และกรองเอาเฉพาะคนที่สถานะ active)
    const todayBookings = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
    const onLeaveCount = todayBookings.length;
    
    // 🟢 จัดกลุ่มคนลา (ป้องกันกรณีลาครึ่งเช้า+บ่าย แล้วชื่อซ้ำ) และดึงข้อมูล ชื่อจริง + รูปภาพ
    const uniqueLeaveUsers = [];
    const seenUserIds = new Set();

    todayBookings.forEach(b => {
        if (!seenUserIds.has(b.userId)) {
            seenUserIds.add(b.userId);
            const user = users.find(u => u.id === b.userId);
            uniqueLeaveUsers.push({
                id: b.userId,
                // ใช้ชื่อจริง และใช้ split(' ')[0] เพื่อตัดเอานามสกุลออก ป้ายชื่อจะได้ไม่ยาวเกินไป
                firstName: user ? user.firstName.split(' ')[0] : b.userName.split(' ')[0], 
                photo: user ? user.photo : null
            });
        }
    });

    const totalUsers = users.length || 1;
    const presentCount = Math.max(0, totalUsers - onLeaveCount);
    const percentage = Math.round((presentCount / totalUsers) * 100);
    
    const target = settings.min_attendance_percent || 96;
    
    return (
        <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6 relative overflow-hidden">

                         </div>
                         <span className="text-[10px] font-bold text-slate-500">เป้าหมาย: <span className="text-slate-700">{target}%</span></span>
                    </div>
                </div>

                <div className="flex items-center gap-3 pl-2">
                    <div className="text-right">
                        <span className={`text-2xl font-black ${percentage >= target ? 'text-emerald-500' : 'text-orange-500'}`}>{percentage}%</span>

                    <div className="w-12 h-12 rounded-full bg-slate-50 flex items-center justify-center relative shadow-inner">

                        </svg>
                    </div>
                </div>
            </div>

            {/* 🟢 ส่วนที่เพิ่มเข้ามาใหม่: แสดงรายชื่อคนลาด้านล่าง พร้อมรูปภาพ */}

};

        const WeeklyForecast = () => {
            const { users, bookings, holidays } = useContext(AppContext);
            
            const getNextWorkingDays = () => {
                const days = [];
                let current = new Date();
                current.setDate(current.getDate() + 1); 
                
                while (days.length < 30) {
                    const dayOfWeek = current.getDay();
                    if (dayOfWeek !== 0 && dayOfWeek !== 6) { 
                        days.push(new Date(current));
                    }
                    current.setDate(current.getDate() + 1);
                }
                return days;
            };

            const forecastDays = getNextWorkingDays();

            return (
                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
                    <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <Icons.Calendar className="text-blue-500" size={20}/> Attendance plan
                    </h3>
                    
                    <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                        {forecastDays.map((date, idx) => {
                            const dateKey = `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
                            const isHoliday = holidays[dateKey];
                            
                            const whoIsAway = Object.values(bookings).filter(b => b.date === dateKey);
                            
                            const awayCount = whoIsAway.length;
                            const totalUsers = users.length || 1;
                            const attendancePercent = isHoliday ? 0 : Math.round(((totalUsers - awayCount) / totalUsers) * 100);

                            return (
                                <div key={idx} className="flex items-center justify-between border-b border-slate-50 pb-2 last:border-0 last:pb-0">

                                    </div>
                                    
                                    <div className="flex-1 px-3 min-w-0">
                                        {isHoliday ? (
                                            <span className="text-xs font-bold text-orange-400 bg-orange-50 px-2 py-1 rounded-lg">วันหยุด</span>
                                        ) : awayCount === 0 ? (
                                            <span className="text-xs text-emerald-500 font-bold flex items-center gap-1"><Icons.CheckCircle size={12}/> มาครบ</span>
                                        ) : (
                                            <div className="flex flex-wrap gap-1">
                                                {whoIsAway.map((b, i) => {
                                                    const bookerUser = users.find(u => u.id === b.userId);

                                                    )

                                            <div>
                                                <div className={`text-sm font-black ${attendancePercent === 100 ? 'text-emerald-500' : attendancePercent > 80 ? 'text-blue-500' : 'text-orange-500'}`}>
                                                    {attendancePercent}%
                                                </div>
                                            </div>
                                         )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const AdminStats = () => {
            const { users, bookings, holidays } = useContext(AppContext);

            const totalMembers = users.length;
            
            const totalQuota = users.reduce((sum, u) => sum + (parseFloat(u.quota) || 0), 0);
            
            const allBookings = Object.values(bookings);
            const totalVacationUsed = allBookings
                .filter(b => b.type === 'vacation') 
                .reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);

            const vacationPercent = totalQuota > 0 ? (totalVacationUsed / totalQuota) * 100 : 0;

            const calculateWorkingDays = () => {
                const year = new Date().getFullYear();
                const startOfYear = new Date(year, 0, 1);
                const endOfYear = new Date(year, 11, 31); 
                const today = new Date();
                today.setHours(0,0,0,0);

                let totalDays = 0;
                let remainingDays = 0;

                let tempDate = new Date(startOfYear);
                while (tempDate <= endOfYear) {
                    const dateKey = `${tempDate.getFullYear()}-${tempDate.getMonth() + 1}-${tempDate.getDate()}`;
                    const day = tempDate.getDay();
                    const isWeekend = day === 0 || day === 6; 
                    const isHoliday = !!holidays[dateKey]; 

                    if (!isWeekend && !isHoliday) {
                        totalDays++;
                        if (tempDate >= today) { 
                            remainingDays++;
                        }
                    }
                    tempDate.setDate(tempDate.getDate() + 1);
                }
                return { totalDays, remainingDays };
            };

            const { totalDays, remainingDays } = calculateWorkingDays();
            const workPercent = totalDays > 0 ? (remainingDays / totalDays) * 100 : 0;

            const StatCard = ({ title, icon: Icon, color, valueMain, valueSub, percent, labelLeft, labelRight }) => (

                                <span className={`text-3xl font-black ${color.text} tracking-tighter block`}>{valueMain}</span>
                                <span className="text-xs text-slate-400 font-bold">{labelLeft}</span>
                            </div>
                            <div className="text-right">
                                <span className="text-lg font-bold text-slate-700 block">{valueSub}</span>
                                <span className="text-xs text-slate-400 font-bold">{labelRight}</span>
                            </div>
                        </div>

                        <div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden p-0.5">
                            <div className={`h-full rounded-full ${color.bar} transition-all duration-1000 ease-out relative overflow-hidden`} style={{ width: `${percent}%` }}>
                                <div className="absolute inset-0 bg-white/30 w-full h-full animate-[shimmer_2s_infinite]"></div>
                            </div>
                        </div>
                        <div className="text-right mt-1">
                             <span className={`text-[10px] font-bold ${color.text}`}>{percent.toFixed(1)}%</span>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 animate-in slide-up">
                    
                    <div className="md:col-span-2 bg-gradient-to-br from-indigo-500 to-blue-600 p-6 rounded-[2rem] text-white shadow-lg shadow-blue-200 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                        <div className="absolute bottom-0 left-0 w-24 h-24 bg-black/10 rounded-full -ml-8 -mb-8 blur-xl"></div>
                        
                        <div className="flex items-center justify-between relative z-10">

                                <h3 className="text-5xl font-black tracking-tight">{totalMembers} <span className="text-xl font-bold text-blue-200">คน</span></h3>
                            </div>
                            <div className="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-2xl flex items-center justify-center border border-white/30">
                                <Icons.UserCheck size={32} className="text-white" />
                            </div>
                        </div>
                    </div>

                        title="ภาพรวมวันลาพักร้อน"
                        icon={Icons.Cloud}
                        color={{ bg: 'bg-blue-50', text: 'text-blue-600', bar: 'bg-blue-500' }}
                        valueMain={totalVacationUsed.toFixed(1)}
                        labelLeft="ใช้ไปแล้ว (วัน)"
                        valueSub={totalQuota}
                        labelRight="โควตารวม (วัน)"
                        percent={vacationPercent}
                    />

                        title={`วันทำงานปี ${new Date().getFullYear()}`}
                        icon={Icons.Briefcase}
                        color={{ bg: 'bg-emerald-50', text: 'text-emerald-600', bar: 'bg-emerald-500' }}
                        valueMain={remainingDays}
                        labelLeft="เหลือวันทำงาน (วัน)"
                        valueSub={totalDays}
                        labelRight="วันทำงานทั้งปี (วัน)"
                        percent={workPercent}
                    />

                    <style>{`
                        @keyframes shimmer {
                            0% { transform: translateX(-100%); }
                            100% { transform: translateX(100%); }
                        }
                    `}</style>
                </div>
            );
        };

            const { currentView, setCurrentView, logout, isAdminLoggedIn } = useContext(AppContext);
            
            const navItems = isAdminLoggedIn ? [
                { view: 'adminDashboard', icon: Icons.Home, label: 'หน้าหลัก' },

            const compressImage = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const MAX_WIDTH = 800;
                            const scaleSize = MAX_WIDTH / img.width;
                            const width = (scaleSize < 1) ? MAX_WIDTH : img.width;
                            const height = (scaleSize < 1) ? img.height * scaleSize : img.height;

                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                        };
                        img.onerror = (error) => reject(error);
                    };
                    reader.onerror = (error) => reject(error);
                });
            };

            const handlePhotoChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    setIsCompressing(true);
                    try {
                        const compressedBase64 = await compressImage(file);

                    } catch (error) {
                        console.error("Compression error:", error);

                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-orange-100 relative overflow-hidden group flex flex-col justify-between h-28">

                                <div className="w-1.5 h-1.5 bg-orange-500 rounded-full"></div> ลากิจ
                            </div>

                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-rose-100 relative overflow-hidden group flex flex-col justify-between h-28">

                            <div className="relative z-10 flex items-center gap-1 text-slate-400 text-[10px] font-bold uppercase tracking-wider">

                            </div>
                            <div className="relative z-10 mt-2">
                                <span className="text-3xl font-black text-rose-500 tracking-tighter">{formatNum(sickUsed)}</span>
                                <span className="text-[10px] text-slate-400 font-bold ml-1">วัน</span>

                    <div className="relative z-10">
                        <WeeklyForecast />

                    {/* เอา "ประวัติการลาล่าสุด" ออกไปแล้ว */}

            );
        };

        const BookingView = () => {
            const { bookings, holidays, users, currentUser, toggleBooking, showModal, settings } = useContext(AppContext);
            const [selectedDate, setSelectedDate] = useState(null);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            
            const [leaveType, setLeaveType] = useState('vacation');
            const [leaveAmount, setLeaveAmount] = useState("1"); 
            const [isModalOpen, setIsModalOpen] = useState(false);

            const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 
                if (dayOfWeek === 0 || dayOfWeek === 6) return 'holiday_reg';
                
                const dateJan1 = new Date(year, 0, 1);
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) return 'work_B'; 
                else return 'work_A'; 
            };

            const getDayStatus = (day) => {
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                const dayType = holidays[dateKey] || getDefaultStatus(currentMonth.getFullYear(), currentMonth.getMonth() + 1, day);
                const isHoliday = (dayType === 'holiday_reg' || dayType === 'holiday_co'|| dayType === 'holiday_nonpro');
                
                
                const bookingsOnDate = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
                
                const maxLeaves = settings.max_leaves_per_day ? parseInt(settings.max_leaves_per_day) : 2; 

                let result = { 
                    status: 'available', 
                    type: dayType, 
                    text: '', 
                    bookers: bookingsOnDate, 
                    myBooking: null 
                };

                if (isHoliday) {
                    result.status = 'holiday';
                    // 🔴 แก้ไขส่วน if-else นี้
                    if (dayType === 'holiday_co') result.text = 'บ.หยุด';
                    else if (dayType === 'holiday_nonpro') result.text = 'Non Pro.';
                    else result.text = 'หยุด';
                    
                    return result;
                }

                const myBooking = bookingsOnDate.find(b => b.userId === currentUser.id);
                if (myBooking) {
                    result.status = 'booked';
                    result.myBooking = myBooking;
                    return result;
                }

                if (bookingsOnDate.length >= maxLeaves) {
                    result.status = 'full';
                    result.text = 'เต็ม'; 
                    return result;
                }

                return result;
            };

            const handleDateClick = (day) => {
                const status = getDayStatus(day);
                if (status.status === 'holiday' || status.status === 'full') return;
                
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                const selected = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                if (selected < today) return showModal("ผิดพลาด", "ไม่สามารถลาวันย้อนหลังได้", "alert");

                setSelectedDate(selected);
                
                if (status.status === 'booked') {
                     showModal("ยกเลิกวันลา", `ต้องการยกเลิกการลาวันที่ ${day} หรือไม่?`, "confirm", () => {
                        toggleBooking(dateKey, currentUser, 'vacation', false); 
                    });
                } else {
                    setLeaveType('vacation');
                    setLeaveAmount("1");
                    setIsModalOpen(true);
                }
            };

            const handleConfirm = async () => {
                if (!selectedDate) return;

                if (leaveType === 'vacation') {
                    const myBookings = Object.values(bookings).filter(b => b.userId === currentUser.id && b.type === 'vacation');
                    const used = myBookings.reduce((sum, b) => sum + (parseFloat(b.amount) || 1), 0);
                    if (used + parseFloat(leaveAmount) > parseFloat(currentUser.quota)) {
                        setIsModalOpen(false);
                        return showModal("โควตาไม่พอ", "คุณใช้วันลาพักร้อนครบโควตาแล้ว", "alert");
                    }
                }

                const today = new Date();
                today.setHours(0,0,0,0);
                const diffTime = selectedDate.getTime() - today.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const minDays = settings.min_advance_days !== undefined ? parseInt(settings.min_advance_days) : 3;
                const maxMonths = settings.max_advance_months !== undefined ? parseInt(settings.max_advance_months) : 3;
                const maxDays = maxMonths * 30;

                if (diffDays < minDays) {
                    setIsModalOpen(false);
                    return showModal("ไม่สามารถจองวันลาได้", `หากต้องการลาติดต่อพี่ยู 088-6555893`, "alert");
                }
                if (diffDays > maxDays) {
                    setIsModalOpen(false);
                    return showModal("ไม่สามารถจองวันลาได้", `หากต้องการลาติดต่อ Team Leader`, "alert");
                }

                const dateKey = `${selectedDate.getFullYear()}-${selectedDate.getMonth() + 1}-${selectedDate.getDate()}`;
                
                const result = await toggleBooking(dateKey, currentUser, leaveType, true, parseFloat(leaveAmount));
                
                setIsModalOpen(false);
                if (!result.success) {
                    showModal("ผิดพลาด", result.message, "alert");
                }
            };

            const renderCalendar = () => {
                const days = [];
                const totalDays = daysInMonth(currentMonth);
                const startDay = firstDayOfMonth(currentMonth);

                for (let i = 0; i < startDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-14"></div>);
                }

                for (let i = 1; i <= totalDays; i++) {
                    const status = getDayStatus(i);
                    let bgClass = "bg-white border-slate-100 text-slate-700";
                    let statusIcon = null;

                    if (status.type === 'work_A') bgClass = "bg-yellow-50 border-yellow-100 text-yellow-800";
                    else if (status.type === 'work_B') bgClass = "bg-emerald-50 border-emerald-100 text-emerald-800";
                    else if (status.type === 'holiday_reg') bgClass = "bg-slate-100 border-slate-200 text-slate-400";
                    else if (status.type === 'holiday_co') bgClass = "bg-pink-50 border-pink-100 text-pink-600";
                    else if (status.type === 'holiday_nonpro') bgClass = "bg-gradient-to-br from-rose-100 via-fuchsia-100 to-indigo-100 border-purple-200 text-purple-700";

                    if (status.status === 'booked') {
                        if (status.myBooking.type === 'vacation') bgClass = "bg-blue-500 text-white shadow-md shadow-blue-200 border-blue-500";
                        else if (status.myBooking.type === 'personal') bgClass = "bg-orange-500 text-white shadow-md shadow-orange-200 border-orange-500";
                        else if (status.myBooking.type === 'sick') bgClass = "bg-rose-500 text-white shadow-md shadow-rose-200 border-rose-500";
                        else if (status.myBooking.type === 'special') bgClass = "bg-purple-500 text-white shadow-md shadow-purple-200 border-purple-500"; 
                        
                        statusIcon = <Icons.Check size={14} className="absolute top-1 right-1 stroke-[3]"/>;
                    } 
                    else if (status.status === 'full') {
                        bgClass += " cursor-not-allowed";
                        statusIcon = <Icons.Lock size={12} className="absolute top-1 right-1 text-slate-500" />;
                    }
                    else if (status.status === 'holiday') {
                        bgClass += " opacity-80 cursor-not-allowed";
                    }

                    const today = new Date();
                    const isToday = today.getDate() === i && today.getMonth() === currentMonth.getMonth() && today.getFullYear() === currentMonth.getFullYear();

                    days.push(
                        <div key={i} onClick={() => handleDateClick(i)} className={`h-14 rounded-xl border flex flex-col items-center justify-start pt-1 relative cursor-pointer transition-all active:scale-95 ${bgClass} ${isToday ? 'ring-2 ring-blue-500 ring-offset-2 z-10' : ''}`}>
                            <span className="text-sm font-bold leading-none">{i}</span>
                            
                            {statusIcon}

                            <div className="mt-0.5 flex flex-col items-center w-full px-0.5 space-y-0.5">
                                {status.status !== 'holiday' && status.bookers && status.bookers.length > 0 && (
                                    status.bookers.slice(0, 3).map((b, idx) => {
                                        const bookerUser = users.find(u => u.id === b.userId);
                                        // นำชื่อจริงมาใช้แทนชื่อเล่น
                                        const displayFirstName = bookerUser ? bookerUser.firstName.split(' ')[0] : b.userName.split(' ')[0];
                                        const photoUrl = bookerUser ? getDriveImgUrl(bookerUser.photo) : null;
                                        const isBookedCell = status.status === 'booked';

                                        return (
                                            <div key={idx} className="relative w-full h-[18px] flex items-center justify-center overflow-hidden rounded-sm">
                                                {/* เลเยอร์ชื่อจริง (สลับการแสดงผลกับรูปภาพ) */}
                                                <div className="absolute inset-0 flex items-center justify-center animate-cf-name">
                                                    <span className={`text-[8px] font-bold truncate px-1 py-0.5 w-full text-center ${isBookedCell ? 'bg-white/20 text-white' : 'bg-blue-50 text-blue-600 border border-blue-100'} rounded-sm leading-tight`}>
                                                        {displayFirstName}
                                                    </span>
                                                </div>
                                                {/* เลเยอร์รูปภาพ (สลับการแสดงผลกับชื่อจริง) */}
                                                <div className="absolute inset-0 flex items-center justify-center animate-cf-image">
                                                    {photoUrl ? (
                                                        <img src={photoUrl} className={`w-[16px] h-[16px] rounded-full object-cover shadow-sm ${isBookedCell ? 'border border-white/50' : ''}`} />
                                                    ) : (
                                                        <div className={`w-[16px] h-[16px] rounded-full flex items-center justify-center ${isBookedCell ? 'bg-white/30 text-white' : 'bg-blue-100 text-blue-500'}`}>
                                                            <Icons.User size={10} />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                                {status.status !== 'holiday' && status.bookers && status.bookers.length > 3 && (
                                    <span className="text-[7px] font-bold text-slate-500">+{status.bookers.length - 3}</span>
                                )}

                                {status.status === 'holiday' && <span className="text-[8px] truncate w-full text-center px-1 font-bold">{status.text}</span>}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="min-h-screen bg-white pb-32 animate-in">
                    
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 slide-up shadow-2xl">
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-3 text-blue-600">
                                        <Icons.Calendar size={32}/>
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800">
                                        {selectedDate && selectedDate.toLocaleDateString('th-TH', {day: 'numeric', month: 'long', year: 'numeric'})}
                                    </h3>
                                    <p className="text-slate-400 text-xs mt-1">รายละเอียดการลา</p>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1">ประเภทการลา</label>
                                        <div className="grid grid-cols-2 gap-2 mt-1">
                                            <button onClick={()=>setLeaveType('vacation')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='vacation'?'bg-blue-500 text-white border-blue-500 shadow-lg shadow-blue-200':'bg-white text-slate-500 border-slate-200'}`}>พักร้อน</button>
                                            <button onClick={()=>setLeaveType('personal')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='personal'?'bg-orange-500 text-white border-orange-500 shadow-lg shadow-orange-200':'bg-white text-slate-500 border-slate-200'}`}>ลากิจ</button>
                                            <button onClick={()=>setLeaveType('sick')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='sick'?'bg-rose-500 text-white border-rose-500 shadow-lg shadow-rose-200':'bg-white text-slate-500 border-slate-200'}`}>ลาป่วย</button>
                                            <button onClick={()=>setLeaveType('special')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='special'?'bg-purple-500 text-white border-purple-500 shadow-lg shadow-purple-200':'bg-white text-slate-500 border-slate-200'}`}>ลากิจพิเศษ</button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-400 ml-1">ระยะเวลา</label>
                                        <select value={leaveAmount} onChange={(e)=>setLeaveAmount(e.target.value)} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                            <option value="1">1.00 (เต็มวัน)</option>
                                            <option value="0.47">0.47 (ครึ่งเช้า)</option>
                                            <option value="0.53">0.53 (ครึ่งบ่าย)</option>
                                        </select>
                                    </div>

                                    {leaveType === 'special' && (
                                        <div className="text-[10px] text-purple-500 font-bold bg-purple-50 p-2 rounded-lg text-center">
                                            * ลากิจพิเศษ จะไม่ถูกหักโควตาวันลา
                                        </div>
                                    )}

                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setIsModalOpen(false)} className="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold">ยกเลิก</button>
                                        <button onClick={handleConfirm} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">ยืนยัน</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-slate-900 text-white p-6 rounded-b-[2.5rem] shadow-xl shadow-slate-200 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 -mr-16 -mt-16"></div>
                         <div className="relative z-10">
                            <h2 className="text-2xl font-black mb-6 text-center">วางแผนวันลา</h2>
                            <div className="flex items-center justify-between bg-white/10 backdrop-blur-md p-2 rounded-2xl border border-white/10">
                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><Icons.ChevronLeft /></button>
                                <span className="font-bold text-lg">
                                    {currentMonth.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' })}
                                </span>
                                <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 hover:bg-white/10 rounded-xl transition-colors"><Icons.ChevronRight /></button>
                            </div>
                        </div>
                    </div>

                    <div className="p-6 -mt-4">
                        <div className="flex justify-center gap-3 mb-4 text-[10px] font-bold text-slate-500 bg-white p-2 rounded-xl shadow-sm border border-slate-100 mx-4 flex-wrap">
                             <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-yellow-500"></div> กะ A</span>
                             <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-500"></div> กะ B</span>
                             <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-pink-500"></div> หยุด บ.</span>
                             <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-slate-400"></div> หยุดปกติ</span>
                             <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-gradient-to-br from-rose-400 via-fuchsia-500 to-indigo-500"></div> Non Pro.</span>
                             
                        </div>
                        <div className="grid grid-cols-7 gap-1 text-center mb-2">
                            <span className="text-red-400 font-bold text-xs">อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span className="text-blue-400 font-bold text-xs">ส</span>
                        </div>
                        <div className="grid grid-cols-7 gap-2">
                            {renderCalendar()}
                        </div>
                    </div>
                </div>
            );
        };
        
        const EditUserModal = ({ user, onClose }) => {
            const { adminEditUser, showModal, currentUser } = useContext(AppContext);
            const [formData, setFormData] = useState({ ...user, password: '' }); 
            const [photoPreview, setPhotoPreview] = useState(null);
            const fileInputRef = useRef(null);

            const isAdmin = currentUser?.role === 'admin';

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) return showModal("ขนาดไฟล์เกิน", "รูปภาพต้องมีขนาดไม่เกิน 5MB");
                    
                    const reader = new FileReader();
                    reader.onloadend = () => setPhotoPreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                showModal("ยืนยันแก้ไข", "บันทึกการเปลี่ยนแปลงข้อมูลสมาชิก?", "confirm", async () => {
                    const payload = { ...formData };
                    if (photoPreview) payload.photo = photoPreview;
                    
                    const success = await adminEditUser(payload);
                    if (success) {
                        showModal("สำเร็จ", "แก้ไขข้อมูลเรียบร้อย", "alert");
                        onClose();
                    } else {
                        showModal("ผิดพลาด", "บันทึกไม่สำเร็จ", "alert");
                    }
                });
            };

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 slide-up shadow-2xl overflow-y-auto max-h-[90vh]">
                        <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <Icons.Edit className="text-blue-500"/> แก้ไขข้อมูลสมาชิก
                        </h3>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="flex flex-col items-center mb-4">
                                <div onClick={() => fileInputRef.current.click()} className="w-24 h-24 rounded-full bg-slate-100 border-4 border-white shadow-lg flex items-center justify-center cursor-pointer overflow-hidden relative group">
                                    {photoPreview ? 
                                        <img src={photoPreview} className="w-full h-full object-cover" /> : 
                                        (formData.photo ? <img src={getDriveImgUrl(formData.photo)} className="w-full h-full object-cover"/> : <Icons.Camera size={28} className="text-slate-300" />)
                                    }
                                    <div className="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center text-white text-[10px] font-bold">เปลี่ยนรูป</div>
                                </div>
                                <input type="file" ref={fileInputRef} onChange={handlePhotoChange} accept="image/*" hidden />
                                <div className="text-xs text-slate-400 mt-2">กดที่รูปเพื่อเปลี่ยน</div>

                            <div className="grid grid-cols-2 gap-3">

            // Modal States
            const [isModalOpen, setIsModalOpen] = useState(false);

            const [leaveAmount, setLeaveAmount] = useState("1");

            const daysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const firstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            // เพิ่มฟังก์ชันคำนวณกะ A / กะ B สำหรับแอดมิน
            const getDefaultStatus = (year, month, day) => {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay(); 
                if (dayOfWeek === 0 || dayOfWeek === 6) return 'holiday_reg';
                
                const dateJan1 = new Date(year, 0, 1);
                let firstMonday = new Date(dateJan1);
                const dayNum = firstMonday.getDay();
                const diff = firstMonday.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                firstMonday.setDate(diff);
                firstMonday.setHours(0, 0, 0, 0);

                const timeDiff = date.getTime() - firstMonday.getTime();
                const weekNumber = Math.floor(timeDiff / (1000 * 60 * 60 * 24 * 7));
                
                if (weekNumber % 4 < 2) return 'work_B'; 
                else return 'work_A'; 
            };

            const getDayStatus = (day) => {
                const dateKey = `${currentMonth.getFullYear()}-${currentMonth.getMonth() + 1}-${day}`;
                // ดึงประเภทของวันมาใช้
                const dayType = holidays[dateKey] || getDefaultStatus(currentMonth.getFullYear(), currentMonth.getMonth() + 1, day);
                const isHoliday = (dayType === 'holiday_reg' || dayType === 'holiday_co'|| dayType === 'holiday_nonpro');
                const bookingsOnDate = Object.values(bookings).filter(b => b.date === dateKey && b.status === 'active');
                return { isHoliday, dayType, bookingsOnDate };
            };

            const handleDayClick = (day) => {
                const dateObj = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                const dateKey = `${dateObj.getFullYear()}-${dateObj.getMonth() + 1}-${dateObj.getDate()}`;
                setSelectedDateObj(dateObj);
                setSelectedDateKey(dateKey);
                setViewMode('main');

            const handleSaveLeave = async () => {
                const targetUser = users.find(u => u.id === selectedUserId);
                if (!targetUser) return showModal("ผิดพลาด", "ไม่พบข้อมูลสมาชิก", "alert");
                
                const result = await toggleBooking(selectedDateKey, targetUser, leaveType, true, parseFloat(leaveAmount));
                if (result.success) {
                    setViewMode('main'); 
                    showModal("สำเร็จ", "จองวันลาให้สมาชิกเรียบร้อยแล้ว", "alert");

                    showModal("ผิดพลาด", result.message, "alert");
                }
            };

            const renderCalendar = () => {
                const days = [];
                const totalDays = daysInMonth(currentMonth);
                const startDay = firstDayOfMonth(currentMonth);

                for (let i = 0; i < startDay; i++) {
                    days.push(<div key={`empty-${i}`} className="h-14"></div>);

                for (let i = 1; i <= totalDays; i++) {

                                                        {displayFirstName}

            return (
                <div className="animate-in slide-up">
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center p-4">

                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-6 relative z-10 slide-up shadow-2xl overflow-hidden">
                                
                                {viewMode === 'main' && (
                                    <div className="animate-in">
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">จัดการวันลาของสมาชิก</h3>
                                                <p className="text-xs text-slate-500">{selectedDateObj?.toLocaleDateString('th-TH', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                                            </div>
                                            <button onClick={() => setIsModalOpen(false)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.Check size={20}/></button>
                                        </div>

                                        <div className="space-y-3 max-h-[40vh] overflow-y-auto custom-scrollbar pr-2 mb-4">
                                            {currentBookings.length === 0 ? (

                                            ) : (

                                                                    {u?.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="p-1 w-full h-full text-slate-400"/>}

                                                                    <div className="font-bold text-sm text-slate-700 truncate">{b.userName}</div>

                                                        </div>

                                        <button onClick={() => setViewMode('select_user')} className="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold border border-blue-200 hover:bg-blue-100 flex items-center justify-center gap-2 transition-all active:scale-95">
                                            <Icons.Plus size={18}/> จองวันลาให้สมาชิก
                                        </button>

                                {viewMode === 'select_user' && (
                                    <div className="animate-in slide-in-from-right">
                                        <div className="flex items-center gap-3 mb-6">
                                            <button onClick={() => setViewMode('main')} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200"><Icons.ChevronLeft size={20}/></button>
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">เลือกสมาชิก</h3>
                                                <p className="text-xs text-slate-500">{selectedDateObj?.toLocaleDateString('th-TH', {day: 'numeric', month: 'long', year: 'numeric'})}</p>
                                            </div>
                                        </div>
                                        <div className="space-y-2 max-h-[50vh] overflow-y-auto custom-scrollbar pr-2 pb-2">
                                            {users.length === 0 ? (

                                            ) : (
                                                users.map(u => (
                                                    <button
                                                        key={u.id}
                                                        onClick={() => { setSelectedUserId(u.id); setViewMode('select_leave'); }}
                                                        className="w-full flex items-center gap-3 p-3 rounded-xl border border-slate-100 bg-slate-50 hover:bg-blue-50 hover:border-blue-200 transition-all text-left"
                                                    >
                                                        <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0">
                                                            {u.photo ? <img src={getDriveImgUrl(u.photo)} className="w-full h-full object-cover"/> : <Icons.User className="w-full h-full p-2 text-slate-400"/>}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="font-bold text-slate-700 truncate">{u.firstName}</div>
                                                            <div className="text-xs text-slate-500 truncate">({u.nickName})</div>
                                                        </div>
                                                        <Icons.ChevronRight size={16} className="text-slate-400" />
                                                    </button>
                                                ))
                                            )}

                                )}

                                {viewMode === 'select_leave' && (
                                    <div className="animate-in slide-in-from-right">

                                                    <button onClick={()=>setLeaveType('personal')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='personal'?'bg-orange-500 text-white border-orange-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลากิจ</button>
                                                    <button onClick={()=>setLeaveType('sick')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='sick'?'bg-rose-500 text-white border-rose-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลาป่วย</button>
                                                    <button onClick={()=>setLeaveType('special')} className={`p-3 rounded-xl border text-sm font-bold transition-all ${leaveType==='special'?'bg-purple-500 text-white border-purple-500 shadow-md':'bg-white text-slate-500 border-slate-200'}`}>ลากิจพิเศษ</button>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 ml-1">ระยะเวลา</label>
                                                <select value={leaveAmount} onChange={(e)=>setLeaveAmount(e.target.value)} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-700 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                                    <option value="1">1.00 (เต็มวัน)</option>
                                                    <option value="0.47">0.47 (ครึ่งเช้า)</option>
                                                    <option value="0.53">0.53 (ครึ่งบ่าย)</option>

                                                <button onClick={handleSaveLeave} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all active:scale-95">ยืนยันการจอง</button>

                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-pink-500"></div> หยุด บ.</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-slate-400"></div> หยุดปกติ</span>
                            <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-gradient-to-br from-rose-400 via-fuchsia-500 to-indigo-500"></div> Non Pro.</span>
